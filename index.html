      const hasSteps = opFlowHasAggregateSteps();
      if (opFlowFromBusinessProcess) {
        opFlowSaveEl.textContent = "保存";
        const hasChanges = opFlowTotalStepCount() !== opFlowBaselineStepCount;
        opFlowSaveEl.disabled = !hasChanges;
        opFlowSaveEl.classList.toggle("op-flow-save--dirty", hasChanges);
        if (opFlowSaveWrapEl) {
          if (!hasChanges) {
            opFlowSaveWrapEl.setAttribute("data-tip", "当前操作步数无变更");
            opFlowSaveWrapEl.classList.add("op-flow-save-wrap--disabled-tip");
          } else {
            opFlowSaveWrapEl.removeAttribute("data-tip");
            opFlowSaveWrapEl.classList.remove("op-flow-save-wrap--disabled-tip");
          }
        }
        if (opFlowEditCancelEl) {
          opFlowEditCancelEl.hidden = true;
          opFlowEditCancelEl.disabled = true;
        }
        return;
      }
      opFlowBusinessEditing = false;
      opFlowSaveEl.textContent = "保存";
      opFlowSaveEl.disabled = !hasSteps;
      opFlowSaveEl.classList.remove("op-flow-save--dirty");
      if (opFlowSaveWrapEl) {
        opFlowSaveWrapEl.removeAttribute("data-tip");
        opFlowSaveWrapEl.classList.remove("op-flow-save-wrap--disabled-tip");
      }
      if (opFlowEditCancelEl) {
        opFlowEditCancelEl.hidden = true;
        opFlowEditCancelEl.disabled = true;
      }
    }

    function enterFlowWithFirstModule(firstLeafId, firstModule) {
      bpWorkspaceResourceOverview = false;
      const leafId = firstLeafId || "physical-modeling";
      const apply = () => {
        applyNavPanelEntryDefault(false);
        if (firstModule) applyModuleToLiveState(firstModule);
        activeOpFlowSectionTitle = getNavLeafLabel(leafId);
        enterProcessDevMode(leafId);
      };
      animateHubToWorkspace(apply);
    }

    function enterExistingBusinessProcessOverview(item, modules) {
      bpWorkspaceResourceOverview = true;
      bpOverviewModuleIndex = 0;
      bpOverviewSearchQuery = "";
      bpOverviewPage = 1;
      const apply = () => {
        applyNavPanelEntryDefault(false);
        modules.forEach((m) => applyModuleToLiveState(m));
        activeOpFlowSectionTitle = null;
        enterProcessDevMode(null);
        syncCanvas();
        renderNav({ skipSyncCanvas: true });
        renderOperationFlow();
      };
      animateHubToWorkspace(apply);
    }

    function openBusinessProcessToPhysical(item) {
      resourceDetailState = null;
      const modules = getBpFlowModules(item);
      const bpTitle = getBpDisplayTitle(item) || "业务流程";
      resetAllOpFlowLiveStates();
      devPathFlowState = buildDevPathStateFromModules(item, modules);
      opFlowFromBusinessProcess = true;
      opFlowBusinessEditing = false;
      opFlowSourceProcessItem = item;
      opFlowBaselineStepCount = computeStepCountFromModules(modules);
      workspaceFlowTitle = bpTitle;
      opFlowVisitStack = modules.map((m) => ({
        leafId: m.leafId,
        label: getOpFlowSectionTitle(m.leafId),
        operationLabel: getModuleOperationLabel(m),
        snapshot: buildModuleOpSnapshot(m),
        fromBusinessProcess: true,
      }));
      setOpFlowModuleList(modules.map((m) => m.leafId));
      physicalCanvasMode = "list";
      reverseModelingStep = 1;
      enterExistingBusinessProcessOverview(item, modules);
      appendOperation({ id: "bp-open-" + item.id, label: "业务流程 · " + bpTitle });
    }

    function getNavLeafLabel(leafId) {
      if (leafId == null || leafId === "") return "";
      for (let i = 0; i < navTree.length; i += 1) {
        const node = navTree[i];
        if (node.type === "leaf" && node.id === leafId) return node.label;
        if (node.type === "group" && node.children) {
          const ch = node.children.find((c) => c.id === leafId);
          if (ch) return ch.label;
        }
      }
      return String(leafId);
    }

    function getOpFlowSectionTitle(leafId) {
      const base = getNavLeafLabel(leafId);
      if (!leafId || !isOpFlowModuleListLocked()) return base;
      const dupCount = opFlowModuleLeafIds.filter((id) => getNavLeafLabel(id) === base).length;
      if (dupCount <= 1) return base;
      for (let i = 0; i < navTree.length; i += 1) {
        const node = navTree[i];
        if (node.type === "group" && node.children) {
          const ch = node.children.find((c) => c.id === leafId);
          if (ch) return node.label + " · " + ch.label;
        }
      }
      return base;
    }

    function ensureOpFlowModuleListInitialized() {
      if (opFlowModuleLeafIds.length || !isProcessDevWorkspace()) return;
      if (devPathFlowState && devPathFlowState.modules && devPathFlowState.modules.length) {
        opFlowModuleLeafIds = [
          ...new Set(devPathFlowState.modules.map((m) => m.leafId).filter(Boolean)),
        ];
        syncOpFlowStackToModuleList();
        return;
      }
      if (opFlowVisitStack.length) {
        opFlowModuleLeafIds = [...new Set(opFlowVisitStack.map((v) => v.leafId).filter(Boolean))];
        syncOpFlowStackToModuleList();
      }
    }

    function resolveOpFlowNavLeafId(label, preferLeafId) {
      const lab = String(label || "").trim();
      if (!lab) return preferLeafId || null;
      if (preferLeafId && getNavLeafLabel(preferLeafId) === lab) return preferLeafId;
      if (isOpFlowModuleListLocked()) {
        const plainMatches = opFlowModuleLeafIds.filter((id) => getNavLeafLabel(id) === lab);
        if (plainMatches.length === 1) return plainMatches[0];
        if (plainMatches.length > 1) {
          if (preferLeafId && plainMatches.includes(preferLeafId)) return preferLeafId;
          if (selectedLeafId && plainMatches.includes(selectedLeafId)) return selectedLeafId;
          return plainMatches[0];
        }
        const fullMatches = opFlowModuleLeafIds.filter((id) => getOpFlowSectionTitle(id) === lab);
        if (fullMatches.length === 1) return fullMatches[0];
        if (fullMatches.length > 1) {
          if (preferLeafId && fullMatches.includes(preferLeafId)) return preferLeafId;
          if (selectedLeafId && fullMatches.includes(selectedLeafId)) return selectedLeafId;
          return fullMatches[0];
        }
      }
      return getNavLeafIdByLabel(lab) || resolveOpFlowNodeNavLeafId(lab);
    }

    function getNavLeafById(leafId) {
      if (leafId == null || leafId === "") return null;
      for (let i = 0; i < navTree.length; i += 1) {
        const node = navTree[i];
        if (node.type === "leaf" && node.id === leafId) return node;
        if (node.type === "group" && node.children) {
          const child = node.children.find((c) => c.id === leafId);
          if (child) return child;
        }
      }
      return null;
    }

    function getNavLeafIdByLabel(label) {
      const target = String(label || "").trim();
      if (!target) return null;
      for (let i = 0; i < navTree.length; i += 1) {
        const node = navTree[i];
        if (node.type === "leaf" && String(node.label || "").trim() === target) return node.id;
        if (node.type === "group" && node.children) {
          const child = node.children.find((c) => String(c.label || "").trim() === target);
          if (child) return child.id;
        }
      }
      return null;
    }

    /** 业务流程开发思路节点文案 → 左侧导航 leafId（与模板映射一致的可扩展表） */
    function resolveOpFlowNodeNavLeafId(label) {
      const lab = String(label || "").trim();
      const map = {
        数据建模: "physical-modeling",
        数据开发: "offline-dev-task",
        数据分析: "create-report",
        API开发: "api-market",
        ODS系统集成: "physical-modeling",
        新建视图: "physical-modeling",
        StartRocks: "physical-modeling",
      };
      return map[lab] || null;
    }

    function handleOpFlowTimelineNodeClick(label, kind) {
      const lab = String(label || "").trim();
      if (kind === "action" && lab === "逆向建模") {
        openReverseModelingFromOpList();
        return;
      }
      if (kind === "resource") {
        openResourceDetailFromOpList(label);
        return;
      }
      const navId = resolveOpFlowNavLeafId(lab, selectedLeafId);
      if (navId) activateNavLeafFromOperationFlow(navId);
    }

    function isOpFlowModuleListLocked() {
      if (opFlowModuleLeafIds.length > 0) return true;
      if (isProcessDevWorkspace() && opFlowFromBusinessProcess) return true;
      if (
        isProcessDevWorkspace() &&
        opFlowVisitStack.some((v) => v.fromBusinessProcess || v.templateStep)
      ) {
        return true;
      }
      return false;
    }

    function isOpFlowFlowViewMode() {
      if (opFlowFromBusinessProcess) return true;
      return isOpFlowModuleListLocked() && !opFlowBusinessEditing;
    }

    function setOpFlowModuleList(leafIds) {
      opFlowModuleLeafIds = (leafIds || []).filter(Boolean);
      syncOpFlowStackToModuleList();
    }

    function syncOpFlowStackToModuleList() {
      if (!opFlowModuleLeafIds.length) return;
      const next = [];
      opFlowModuleLeafIds.forEach((leafId) => {
        const existing = findOpFlowVisit(leafId);
        if (existing) {
          next.push(existing);
          return;
        }
        next.push({
          leafId,
          label: getNavLeafLabel(leafId),
          snapshot: null,
          fromBusinessProcess: opFlowFromBusinessProcess,
        });
      });
      opFlowVisitStack = next;
    }

    function switchOpFlowModule(leafId, options) {
      const opts = options || {};
      const leaf = getNavLeafById(leafId);
      if (!leaf) return;
      if (opFlowFromBusinessProcess) bpWorkspaceResourceOverview = false;
      if (isProcessDevWorkspace()) ensureOpFlowVisitForNavLeaf(leafId);
      selectOpFlowModule(leafId);
      setActiveGroupsForLeaf(leafId);
      resourceDetailState = null;
      centerOverride = null;
      selectedLeafId = leafId;
      syncMainLayout();
      renderNav({ skipSyncCanvas: !!opts.skipSyncCanvas });
      if (!opts.skipSyncCanvas && isProcessDevWorkspace() && opFlowResourceAutoInclude) {
        syncOpFlowCheckedTableResources(leafId);
      }
      if (!opts.skipAppendOp) {
        appendOperation({ id: leafId, label: getNavLeafLabel(leafId) });
      }
    }

    function activateNavLeafFromOperationFlow(leafId) {
      const prev = selectedLeafId;
      if (prev === "smart-dev") smartDevScriptEditorActive = false;
      if (prev && prev !== leafId && findOpFlowVisit(prev)) {
        trySnapshotLastVisitForLeaf(prev);
      }
      if (!isOpFlowFlowViewMode()) {
        resetStateForNavLeaf(leafId);
      }
      switchOpFlowModule(leafId, { skipAppendOp: true });
    }

    function attachOpFlowSectionNavigation(section, head, leafId) {
      if (!leafId) return;
      const sectionTitle = getOpFlowSectionTitle(leafId);
      section.classList.add("op-flow-section--clickable");
      head.classList.add("op-flow-section-head--clickable");
      head.setAttribute("role", "button");
      head.tabIndex = 0;
      head.title = "点击进入" + sectionTitle;
      function openSection(e) {
        if (
          e &&
          e.target.closest(
            ".op-flow-visit-del, .op-flow-node-del, .op-flow-view-all-res, .op-flow-view-all-res-count"
          )
        )
          return;
        if (leafId === selectedLeafId) return;
        activeOpFlowSectionTitle = sectionTitle;
        activateNavLeafFromOperationFlow(leafId);
      }
      head.addEventListener("click", openSection);
      head.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openSection(e);
        }
      });
    }

    function buildTemplateVisit(leafId) {
      return {
        leafId,
        label: getNavLeafLabel(leafId),
        snapshot: null,
        templateStep: true,
      };
    }

    function startNewFlowFromModuleTemplate(template) {
      if (!template) return;
      const modules = flattenTemplateGroups(template);
      if (!modules.length) return;
      bpWorkspaceResourceOverview = false;
      closeBpNewFlowModal();
      resourceDetailState = null;
      resetAllOpFlowLiveStates();
      physicalCanvasMode = "list";
      reverseModelingStep = 1;

      const groups = groupModulesBySection(modules);
      initTemplateFlowLiveStates(modules);
      devPathFlowState = buildDevPathStateFromTemplate(template);

      resetOpFlowBusinessProcessContext();
      opFlowModuleLeafIds = groups.map((g) => g.leafId);
      opFlowVisitStack = groups.map((g) => buildTemplateVisitFromGroup(g));

      const firstLeafId = groups[0].leafId || modules[0].leafId || "physical-modeling";
      workspaceFlowTitle = template.name || "新建流程";
      enterFlowWithFirstModule(firstLeafId, null);
      showToast("已进入「" + template.name + "」开发", "success");
      appendOperation({
        id: "flow-template-" + Date.now(),
        label: "新建流程 · " + template.name,
      });
    }

    function startNewFlowFromTemplate(templateName, leafIds) {
      const preset = BP_PRESET_TEMPLATES.find((t) => t.name === templateName);
      if (preset) {
        startNewFlowFromModuleTemplate(preset);
        return;
      }
      closeBpNewFlowModal();
      resourceDetailState = null;
      resetAllOpFlowLiveStates();
      physicalCanvasMode = "list";
      reverseModelingStep = 1;
      devPathFlowState = {
        title: templateName,
        nodes: leafIds.map((id) => getNavLeafLabel(id)),
        nodeKinds: leafIds.map(() => "action"),
        groupByNavTitle: true,
      };
      resetOpFlowBusinessProcessContext();
      opFlowVisitStack = leafIds.map((leafId) => buildTemplateVisit(leafId));
      setOpFlowModuleList(leafIds);
      const firstLeafId = leafIds[0] || "physical-modeling";
      workspaceFlowTitle = templateName || "新建流程";
      enterFlowWithFirstModule(firstLeafId, null);
      showToast("已进入「" + templateName + "」开发", "success");
      appendOperation({ id: "flow-template-" + Date.now(), label: "新建流程 · " + templateName });
    }

    function startNewFlowFromCustomTemplate(template) {
      startNewFlowFromModuleTemplate(template);
    }

    function startNewBlankFlow() {
      closeBpNewFlowModal();
      resourceDetailState = null;
      resetAllOpFlowLiveStates();
      physicalCanvasMode = "list";
      reverseModelingStep = 1;
      devPathFlowState = null;
      resetOpFlowBusinessProcessContext();
      opFlowModuleLeafIds = [];
      opFlowVisitStack = [];
      workspaceFlowTitle = "新建流程";
      smartDevScriptEditorActive = false;

      const apply = () => {
        applyNavPanelEntryDefault(true);
        activeOpFlowSectionTitle = "";
        enterProcessDevMode(null);
        renderOperationFlow();
        syncOpFlowClearButton();
        syncOpFlowSaveButton();
      };
      animateHubToWorkspace(apply);
      showToast("已进入空白流程开发，请从左侧选择模块开始", "success");
      appendOperation({
        id: "flow-blank-" + Date.now(),
        label: "新建流程 · 空白流程",
      });
    }

    function applyFlowTemplateToOperationFlow(templateName, leafIds) {
      startNewFlowFromTemplate(templateName, leafIds);
    }

    function getNavTitleSet() {
      const set = new Set();
      navTree.forEach((node) => {
        if (node.label) set.add(String(node.label).trim());
        if (node.children) {
          node.children.forEach((child) => {
            if (child.label) set.add(String(child.label).trim());
          });
        }
      });
      return set;
    }

    function buildDevPathSectionsByNavTitle(devPath, fallbackTitle) {
      const navTitles = getNavTitleSet();
      const extraTitles = new Set(
        devPath && devPath.sectionTitles ? devPath.sectionTitles : []
      );
      const nodes = devPath && devPath.nodes ? devPath.nodes : [];
      const kinds = devPath && devPath.nodeKinds ? devPath.nodeKinds : [];
      const sections = [];
      let current = null;

      function isSectionHeader(label, i) {
        const cleanLabel = String(label || "").trim();
        if (!cleanLabel) return false;
        if (kinds[i] === "section") return true;
        return navTitles.has(cleanLabel) || extraTitles.has(cleanLabel);
      }

      nodes.forEach((label, i) => {
        const cleanLabel = String(label || "").trim();
        if (isSectionHeader(cleanLabel, i)) {
          current = {
            title: cleanLabel,
            nodes: [],
            nodeKinds: [],
          };
          sections.push(current);
          return;
        }
        if (!current) {
          current = {
            title: fallbackTitle || "物理建模",
            nodes: [],
            nodeKinds: [],
          };
          sections.push(current);
        }
        current.nodes.push(label);
        current.nodeKinds.push(kinds[i] === "resource" ? "resource" : "action");
      });
      if (!sections.length) {
        sections.push({ title: fallbackTitle || "物理建模", nodes: [], nodeKinds: [] });
      }
      return sections;
    }

    function capturePhysicalOpSnapshot() {
      return {
        devPath: devPathFlowState ? JSON.parse(JSON.stringify(devPathFlowState)) : null,
        physical: JSON.parse(JSON.stringify(physicalFlowState)),
      };
    }

    function captureBusinessModelingOpSnapshot() {
      return {
        business: JSON.parse(JSON.stringify(businessModelingFlowState)),
      };
    }

    function captureSmartDevOpSnapshot() {
      return {
        smartDev: JSON.parse(JSON.stringify(smartDevFlowState)),
      };
    }

    function captureOpSnapshotForLeaf(leafId) {
      const moduleFlow = JSON.parse(JSON.stringify(getLiveFlowStateForLeaf(leafId)));
      if (leafId === "physical-modeling") {
        return {
          moduleFlow,
          physical: JSON.parse(JSON.stringify(physicalFlowState)),
          devPath: devPathFlowState ? JSON.parse(JSON.stringify(devPathFlowState)) : null,
        };
      }
      if (leafId === "business-modeling") {
        return { moduleFlow, business: moduleFlow };
      }
      if (leafId === "smart-dev") {
        return { moduleFlow, smartDev: moduleFlow };
      }
      return { moduleFlow };
    }

    function trySnapshotLastPhysicalVisit() {
      if (!opFlowVisitStack.length) return;
      const last = opFlowVisitStack[opFlowVisitStack.length - 1];
      if (last.leafId !== "physical-modeling") return;
      last.snapshot = capturePhysicalOpSnapshot();
    }

    function trySnapshotLastVisitForLeaf(leafId) {
      if (!leafId) return;
      const visit = findOpFlowVisit(leafId);
      if (!visit) return;
      const nextSnapshot = captureOpSnapshotForLeaf(leafId);
      const nextFlow = nextSnapshot.moduleFlow || nextSnapshot.business || nextSnapshot.smartDev;
      const prevSnapshot = visit.snapshot || {};
      const prevFlow = prevSnapshot.moduleFlow || prevSnapshot.business || prevSnapshot.smartDev;
      const nextHasNodes = !!(nextFlow && nextFlow.nodes && nextFlow.nodes.length);
      const prevHasNodes = !!(prevFlow && prevFlow.nodes && prevFlow.nodes.length);
      if (!nextHasNodes && prevHasNodes) return;
      visit.snapshot = nextSnapshot;
    }

    function appendReverseNodeToDevPath(label, kind) {
      if (!devPathFlowState || !devPathFlowState.nodes) return;
      const nodeKind = kind === "resource" ? "resource" : "action";
      if (nodeKind === "action" && devPathFlowState.nodes.includes(label)) return;
      if (!devPathFlowState.nodeKinds) devPathFlowState.nodeKinds = [];
      const navTitles = getNavTitleSet();
      const activeTitle = String(activeOpFlowSectionTitle || "").trim();
      let insertAt = devPathFlowState.nodes.length;
      if (activeTitle) {
        const sectionStart = devPathFlowState.nodes.findIndex(
          (node) => String(node || "").trim() === activeTitle
        );
        if (sectionStart >= 0) {
          insertAt = sectionStart + 1;
          while (
            insertAt < devPathFlowState.nodes.length &&
            !navTitles.has(String(devPathFlowState.nodes[insertAt] || "").trim())
          ) {
            insertAt += 1;
          }
        }
      }
      devPathFlowState.nodes.splice(insertAt, 0, label);
      devPathFlowState.nodeKinds.splice(insertAt, 0, nodeKind);
      reverseModelingDevPathNodesAdded.push({ label, kind: nodeKind });
    }

    function rollbackReverseDevPathNodes() {
      if (!devPathFlowState || !devPathFlowState.nodes || !reverseModelingDevPathNodesAdded.length) {
        reverseModelingDevPathNodesAdded = [];
        return;
      }
      const kinds = devPathFlowState.nodeKinds || [];
      reverseModelingDevPathNodesAdded
        .slice()
        .reverse()
        .forEach((node) => {
          for (let i = devPathFlowState.nodes.length - 1; i >= 0; i -= 1) {
            if (devPathFlowState.nodes[i] === node.label && (kinds[i] || "action") === node.kind) {
              devPathFlowState.nodes.splice(i, 1);
              if (devPathFlowState.nodeKinds) devPathFlowState.nodeKinds.splice(i, 1);
              break;
            }
          }
        });
      reverseModelingDevPathNodesAdded = [];
    }

    function findOpFlowVisit(leafId) {
      if (!leafId || !opFlowVisitStack.length) return null;
      return opFlowVisitStack.find((v) => v.leafId === leafId) || null;
    }

    function ensureOpFlowVisitForNavLeaf(leafId) {
      if (!leafId) return null;
      const existing = findOpFlowVisit(leafId);
      if (existing) return existing;

      const visit = {
        leafId,
        label: getNavLeafLabel(leafId),
        snapshot: null,
        fromBusinessProcess: opFlowFromBusinessProcess,
      };
      opFlowVisitStack.push(visit);

      if (isOpFlowModuleListLocked() || opFlowModuleLeafIds.length > 0) {
        if (!opFlowModuleLeafIds.includes(leafId)) {
          opFlowModuleLeafIds.push(leafId);
        }
      }

      dedupeOpFlowVisitStack();
      return visit;
    }

    function syncOpFlowCheckedTableResources(leafId) {
      if (!leafId || !isProcessDevWorkspace() || !opFlowResourceAutoInclude || !canvasEl) return;
      const table = canvasEl.querySelector("table");
      if (!table) return;
      table.querySelectorAll("tbody tr").forEach((row) => {
        const cb = row.querySelector('td.col-check input[type="checkbox"]');
        if (!cb || !cb.checked) return;
        const name = resolveOpFlowTableRowResourceName(row);
        recordOpFlowTableCheckboxSelection(leafId, name);
      });
    }

    function dedupeOpFlowVisitStack() {
      const seen = new Set();
      opFlowVisitStack = opFlowVisitStack.filter((visit) => {
        if (!visit || !visit.leafId || seen.has(visit.leafId)) return false;
        seen.add(visit.leafId);
        return true;
      });
    }

    function ensureUniqueOpFlowVisit(leafId, extra) {
      if (!leafId) return null;
      const existing = findOpFlowVisit(leafId);
      if (existing) return existing;
      if (isProcessDevWorkspace()) return null;
      const visit = {
        leafId,
        label: getNavLeafLabel(leafId),
        snapshot: null,
        ...(extra || {}),
      };
      opFlowVisitStack.push(visit);
      return visit;
    }

    function selectOpFlowModule(leafId) {
      if (!leafId) return;
      activeOpFlowSectionTitle = getOpFlowSectionTitle(leafId);
    }

    function pushNavOpVisit(newLeafId) {
      ensureUniqueOpFlowVisit(newLeafId);
    }

    function ensureTrailingOpFlowVisit(leafId) {
      if (!leafId) return null;
      if (isProcessDevWorkspace()) return ensureOpFlowVisitForNavLeaf(leafId);
      return ensureUniqueOpFlowVisit(leafId);
    }

    function prepareOpStackForNavChange(prevLeafId) {
      if (prevLeafId === "smart-dev") smartDevScriptEditorActive = false;
      if (!prevLeafId || !findOpFlowVisit(prevLeafId)) return;
      trySnapshotLastVisitForLeaf(prevLeafId);
    }

    function canDeleteOpFlowItems() {
      if (!isProcessDevWorkspace()) return false;
      return true;
    }

    const opFlowDelIconSvg =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>';

    function createOpFlowDelButton(className, ariaLabel, onClick, iconKind) {
      const del = document.createElement("button");
      del.type = "button";
      del.className = className;
      del.setAttribute("aria-label", ariaLabel);
      del.title = ariaLabel;
      if (iconKind === "close") {
        del.textContent = "×";
      } else {
        del.innerHTML = opFlowDelIconSvg;
      }
      del.addEventListener("click", (e) => {
        e.stopPropagation();
        onClick(e);
      });
      return del;
    }

    function removeOpFlowModuleAt(stackIndex) {
      if (stackIndex < 0 || stackIndex >= opFlowVisitStack.length) return;
      const removed = opFlowVisitStack[stackIndex];
      opFlowVisitStack.splice(stackIndex, 1);
      if (removed && removed.leafId) {
        opFlowModuleLeafIds = opFlowModuleLeafIds.filter((id) => id !== removed.leafId);
        delete opFlowModuleState[removed.leafId];
      }
      if (removed && removed.leafId === selectedLeafId) {
        const nextVisit = opFlowVisitStack[0];
        if (nextVisit && nextVisit.leafId) {
          switchOpFlowModule(nextVisit.leafId, { skipAppendOp: true });
          syncCanvas();
        } else {
          selectedLeafId = null;
          syncCanvas();
        }
      }
      renderOperationFlow();
      showToast("已移除该模块", "success");
    }

    function removeOpFlowModuleNodeAt(leafId, nodeIndex) {
      const state = getLiveFlowStateForLeaf(leafId);
      if (!state.nodes || nodeIndex < 0 || nodeIndex >= state.nodes.length) return;
      const kinds = state.nodeKinds || [];
      const isAction = kinds[nodeIndex] !== "resource";
      const removeIndexes = [nodeIndex];
      if (isAction) {
        for (let i = nodeIndex + 1; i < kinds.length; i += 1) {
          if (kinds[i] === "resource") removeIndexes.push(i);
          else break;
        }
      }
      const removeSet = new Set(removeIndexes);
      const next = {
        nodes: state.nodes.filter((_, i) => !removeSet.has(i)),
        nodeKinds: kinds.filter((_, i) => !removeSet.has(i)),
      };
      setLiveFlowStateForLeaf(leafId, next);
      const visit = findOpFlowVisit(leafId);
      if (visit) trySnapshotLastVisitForLeaf(leafId);
      renderOperationFlow();
      showToast("已移除该操作步骤", "success");
    }

    function removeOpFlowDevPathNodeAt(nodeIndex) {
      if (!devPathFlowState || !devPathFlowState.nodes) return;
      if (nodeIndex < 0 || nodeIndex >= devPathFlowState.nodes.length) return;
      devPathFlowState = {
        ...devPathFlowState,
        nodes: devPathFlowState.nodes.filter((_, i) => i !== nodeIndex),
        nodeKinds: (devPathFlowState.nodeKinds || []).filter((_, i) => i !== nodeIndex),
      };
      renderOperationFlow();
      showToast("已移除该操作步骤", "success");
    }

    function removeOpFlowPhysicalNodeAt(timelineIndex, useDevPath) {
      if (useDevPath) {
        removeOpFlowDevPathNodeAt(timelineIndex);
        return;
      }
      if (timelineIndex === 0 && physicalFlowState.reverse) {
        physicalFlowState = { ...physicalFlowState, reverse: false };
        if (physicalCanvasMode === "reverse-modeling") {
          physicalCanvasMode = "list";
          reverseModelingStep = 1;
          syncCanvas();
        }
      } else {
        const tableIdx = physicalFlowState.reverse ? timelineIndex - 1 : timelineIndex;
        const tables = [...(physicalFlowState.tables || [])];
        if (tableIdx >= 0 && tableIdx < tables.length) {
          tables.splice(tableIdx, 1);
          physicalFlowState = { ...physicalFlowState, tables };
        }
      }
      renderOperationFlow();
      showToast("已移除该操作步骤", "success");
    }

    function attachOpFlowNodeDeleteButton(row, onDelete) {
      if (!canDeleteOpFlowItems() || !onDelete) return;
      row.appendChild(createOpFlowDelButton("op-flow-node-del", "删除此步骤", onDelete, "close"));

    function groupOpFlowTimelineNodes(nodes, kinds) {
      const rawGroups = [];
      let current = null;
      (nodes || []).forEach((label, i) => {
        const rawKind = (kinds || [])[i];
        const kind = rawKind === "resource" ? "resource" : "action";
        if (kind === "action") {
          const actionLabel = normalizeOpFlowActionLabel(label);
          current = { action: { label: actionLabel, index: i }, resources: [] };
          rawGroups.push(current);
          return;
        }
        if (current) {
          current.resources.push({ label, index: i });
          return;
        }
        current = { action: null, resources: [{ label, index: i }] };
        rawGroups.push(current);
      });

      const merged = [];
      const byAction = new Map();
      rawGroups.forEach((group) => {
        if (!group.action) {
          merged.push(group);
          return;
        }
        const key = group.action.label;
        if (byAction.has(key)) {
          byAction.get(key).resources.push(...group.resources);
          return;
        }
        byAction.set(key, group);
        merged.push(group);
      });
      return merged;
    }

    function normalizeModuleFlowState(flow, moduleHint) {
      if (!flow || !flow.nodes || !flow.nodes.length) {
        if (moduleHint) return moduleToFlowState(moduleHint);
        return { nodes: [], nodeKinds: [] };
      }
      const kinds = flow.nodeKinds || [];
      const hasAction = kinds.some((k) => k === "action" || k === "section");
      if (hasAction) return flow;
      const actionLabel =
        flow.operationLabel ||
        (moduleHint ? getModuleOperationLabel(moduleHint) : "操作");
      return {
        nodes: [actionLabel, ...flow.nodes],
        nodeKinds: ["action", ...kinds.map(() => "resource")],
        operationLabel: actionLabel,
      };
    }

    function appendOpFlowGroupedTimeline(section, nodes, nodeKinds, interactive, timelineOpts) {
      const opts = timelineOpts || {};
      const leafId = opts.leafId;
      const stackIndex = opts.stackIndex;
      const onDeleteAt = opts.onDeleteAt;
      if (!nodes || !nodes.length) return;
      const timeline = document.createElement("div");
      timeline.className = "op-flow-timeline";
      const groups = groupOpFlowTimelineNodes(nodes, nodeKinds);
      groups.forEach((group) => {
        const groupEl = document.createElement("div");
        groupEl.className = "op-flow-op-group";
        if (group.action) {
          groupEl.appendChild(
            createOpFlowTimelineNodeRow(
              group.action.label,
              "action",
              interactive,
              false,
              onDeleteAt
                ? () => onDeleteAt(group.action.index)
                : leafId
                  ? () => removeOpFlowModuleNodeAt(leafId, group.action.index)
                  : null
            )
          );
        }
        if (group.resources.length) {
          const resWrap = document.createElement("div");
          resWrap.className = "op-flow-op-group__resources";
          const displayResources =
            group.resources.length > OP_FLOW_SIDEBAR_RESOURCE_MAX
              ? group.resources.slice(0, OP_FLOW_SIDEBAR_RESOURCE_MAX)
              : group.resources;
          displayResources.forEach((res) => {
            resWrap.appendChild(
              createOpFlowTimelineNodeRow(
                res.label,
                "resource",
                interactive,
                true,
                onDeleteAt
                  ? () => onDeleteAt(res.index)
                  : leafId
                    ? () => removeOpFlowModuleNodeAt(leafId, res.index)
                    : null
              )
            );
          });
          groupEl.appendChild(resWrap);
        }
        timeline.appendChild(groupEl);
      });
      section.appendChild(timeline);
    }

    function appendModuleFlowTimeline(section, flowState, interactive, timelineOpts) {
      const normalized = normalizeModuleFlowState(flowState, {
        leafId: timelineOpts && timelineOpts.leafId,
        label: flowState && flowState.operationLabel,
      });
      appendOpFlowGroupedTimeline(
        section,
        normalized.nodes,

        interactive,

    function resolveVisitModuleFlowState(visit, isLive) {
      const snap = visit.snapshot || {};
      const snapFlow =
        snap.moduleFlow ||
        (visit.leafId === "business-modeling" ? snap.business : null) ||
        (visit.leafId === "smart-dev" ? snap.smartDev : null);
      const moduleHint = {
        leafId: visit.leafId,
        label: visit.operationLabel,
        resources: [],
      };

      if (visit.fromBusinessProcess) {
        if (isLive) {
          const live = getLiveFlowStateForLeaf(visit.leafId);
          if (live && live.nodes && live.nodes.length) {
            return normalizeModuleFlowState(live, moduleHint);
          }
        }
        if (snapFlow && snapFlow.nodes) {
          return normalizeModuleFlowState(snapFlow, moduleHint);
        }
        if (visit.operationLabel) {
          return { nodes: [visit.operationLabel], nodeKinds: ["action"] };
        }
        return { nodes: [], nodeKinds: [] };
      }

      if (isLive) {
        const live = getLiveFlowStateForLeaf(visit.leafId);
        if (live && live.nodes && live.nodes.length) {
          return normalizeModuleFlowState(live, moduleHint);
        }
        if (snapFlow && snapFlow.nodes) {
          return normalizeModuleFlowState(snapFlow, moduleHint);
        }
        return live || { nodes: [], nodeKinds: [] };
      }
      if (snapFlow && snapFlow.nodes) {
        return normalizeModuleFlowState(snapFlow, moduleHint);
      }
      if (visit.leafId === "business-modeling" && snap.business) {
        return normalizeModuleFlowState(snap.business, moduleHint);
      }
      if (visit.leafId === "smart-dev" && snap.smartDev) {
        return normalizeModuleFlowState(snap.smartDev, moduleHint);
      }
      return { nodes: [], nodeKinds: [] };
    }

    function smartDevRandomListRowMeta() {
      const modifiers = ["张三", "李四", "王五", "赵六", "钱七", "孙八", "周九", "系统"];
      const descHints = [
        "保存生成的脚本资产",
        "智能开发自动产出",
        "加工逻辑已固化",
        "口径配置副本",
        "关联合同域加工",
      ];
      const now = new Date();
      const p2 = (n) => String(n).padStart(2, "0");
      const time =
        now.getFullYear() +
        "-" +
        p2(now.getMonth() + 1) +
        "-" +
        p2(now.getDate()) +
        " " +
        p2(now.getHours()) +
        ":" +
        p2(now.getMinutes()) +
        ":" +
        p2(now.getSeconds());
      return {
        modifier: modifiers[Math.floor(Math.random() * modifiers.length)],
        time,
        desc:
          descHints[Math.floor(Math.random() * descHints.length)] +
          "（" +
          Math.floor(Math.random() * 900 + 100) +
          "）",

    function pickRandomSmartDevResourceName() {
      const prefixes = ["加工脚本", "SQL资产", "指标配置", "口径视图", "临时表定义", "血缘节点"];
      const p = prefixes[Math.floor(Math.random() * prefixes.length)];
      let n = "";
      if (typeof crypto !== "undefined" && crypto.getRandomValues) {
        const buf = new Uint32Array(1);
        crypto.getRandomValues(buf);
        n = String((buf[0] >>> 0) % 900000 + 100000);
      } else {
        n = String(Math.floor(Math.random() * 900000) + 100000);
      }
      return p + "_" + n;
    }

        nodeKinds: [
          ...(physical && physical.reverse ? ["action"] : []),
          ...((physical && physical.tables) || []).map(() => "resource"),
        ],
      };
      const moduleFlowForCount =
        devPath && devPath.nodes && devPath.nodes.length
          ? { nodes: devPath.nodes, nodeKinds: devPath.nodeKinds || [] }
          : physicalFlowSnapshot;
      appendOpFlowSectionTitleHead(head, titleText || "物理建模", {
        resourceCount: resolveOpFlowSectionResourceCount(stackIndex, resolvedLeafId, moduleFlowForCount),
        stackIndex: typeof stackIndex === "number" && stackIndex >= 0 ? stackIndex : undefined,
        leafId: resolvedLeafId,
      });
      attachOpFlowSectionNavigation(
        section,
        head,
        resolvedLeafId
      );
      const actions = document.createElement("div");
      actions.className = "op-flow-section-actions";
      if (physical && physical.reverse && !devPath) {
        const st = document.createElement("span");
        st.className = "op-flow-section-status";
        st.textContent = "进行中";
        actions.appendChild(st);
      }
      attachOpFlowVisitDeleteButton(actions, deleteKind, stackIndex);
      head.appendChild(actions);
      section.appendChild(head);
      appendPhysicalTimelineFromState(section, devPath, physical, interactive, {
        leafId: resolvedLeafId,
        stackIndex: typeof stackIndex === "number" && stackIndex >= 0 ? stackIndex : undefined,
      });
      if (resolvedLeafId && resolvedLeafId === selectedLeafId) {
        section.classList.add("op-flow-section--active");
      }
      return section;
    }

    function buildBusinessDevPathSections(devPath, physical, interactive, deleteKind, stackIndex) {
      const fragment = document.createDocumentFragment();
      if (isProcessDevWorkspace() && isOpFlowModuleListLocked()) {
        return fragment;
      }
      const sections = buildDevPathSectionsByNavTitle(devPath, "物理建模");
      sections.forEach((part, i) => {
        const partDevPath = {
          title: devPath && devPath.title ? devPath.title : "业务流程",
          nodes: part.nodes,
          nodeKinds: part.nodeKinds,
          groupByNavTitle: !!(devPath && devPath.groupByNavTitle),
        };
        const section = buildPhysicalOpFlowSection(
          part.title,
          partDevPath,
          physical,
          interactive,
          deleteKind,
          stackIndex,
          getNavLeafIdByLabel(part.title)
        );
        if (i > 0) {
          const processName = section.querySelector(".op-flow-process-name");
          if (processName) processName.remove();
        }
        fragment.appendChild(section);
      });
      return fragment;
    }

    function buildGenericOpFlowSection(titleText, flowState, deleteKind, stackIndex, navLeafId, flowSectionOpts) {
      const opts = flowSectionOpts || {};
      const section = document.createElement("div");
      section.className = "op-flow-section";
      const head = document.createElement("div");
      head.className = "op-flow-section-head";
      const sectionTitle = titleText || getOpFlowSectionTitle(navLeafId);
      appendOpFlowSectionTitleHead(head, sectionTitle, {
        resourceCount: resolveOpFlowSectionResourceCount(stackIndex, navLeafId, flowState),
        stackIndex: typeof stackIndex === "number" && stackIndex >= 0 ? stackIndex : undefined,
        leafId: navLeafId,
      });
      attachOpFlowSectionNavigation(section, head, navLeafId);
      const actions = document.createElement("div");
      actions.className = "op-flow-section-actions";
      if (opts.inProgress) {
        const st = document.createElement("span");
        st.className = "op-flow-section-status";
        st.textContent = "进行中";
        actions.appendChild(st);
      }
      attachOpFlowVisitDeleteButton(actions, deleteKind, stackIndex);
      head.appendChild(actions);
      section.appendChild(head);
      appendModuleFlowTimeline(section, flowState, !!opts.interactive, {
        leafId: navLeafId,
        stackIndex: typeof stackIndex === "number" && stackIndex >= 0 ? stackIndex : undefined,
      });
      if (navLeafId && navLeafId === selectedLeafId) {
        section.classList.add("op-flow-section--active");
      }
      return section;
    }

    function buildOpFlowVisitSection(visit, index, total) {
      const isLive = isOpFlowVisitLive(visit);
      const interactive = isLive;

      if (isOpFlowModuleListLocked()) {
        const moduleFlow = resolveVisitModuleFlowState(visit, isLive);
        const sectionTitle = visit.sectionTitle || getOpFlowSectionTitle(visit.leafId);
        return buildGenericOpFlowSection(
          sectionTitle,
          moduleFlow,
          "stack",
          index,
          visit.leafId,
          {
            interactive,
            inProgress: visit.leafId === "smart-dev" && isLive && smartDevScriptEditorActive,
          }
        );
      }

      if (
        visit.leafId === "physical-modeling" &&
        !shouldUseModuleFlowSection(visit) &&
        !opFlowFromBusinessProcess
      ) {
        let devPath = null;
        let physical = { reverse: false, tables: [] };
        if (isLive) {
          devPath = devPathFlowState;
          physical = physicalFlowState;
        } else if (visit.snapshot) {
          devPath = visit.snapshot.devPath;
          physical = visit.snapshot.physical || physical;
        }
        if (devPath && devPath.groupByNavTitle && opFlowVisitStack.length <= 1) {
          return buildBusinessDevPathSections(devPath, physical, interactive, "stack", index);
        }
        if (devPath || physical.reverse || (physical.tables || []).length) {
          return buildPhysicalOpFlowSection(
            visit.label,
            devPath,
            physical,
            interactive,
            "stack",
            index,
            visit.leafId
          );
        }
      }

      const moduleFlow = resolveVisitModuleFlowState(visit, isLive);
      return buildGenericOpFlowSection(visit.label, moduleFlow, "stack", index, visit.leafId, {
        interactive,
        inProgress: visit.leafId === "smart-dev" && isLive && smartDevScriptEditorActive,
      });
    }

    function renderOpFlowStackSections() {
      opFlowStepBadgeEl.textContent = `${opFlowTotalStepCount()}步`;
      opFlowVisitStack.forEach((v, i) =>
        opListEl.appendChild(buildOpFlowVisitSection(v, i, opFlowVisitStack.length))
      );
      syncOpFlowClearButton();
      syncOpFlowSaveButton();
    }

    function renderOperationFlow() {
      opListEl.innerHTML = "";
      if (isProcessDevWorkspace()) {
        ensureOpFlowModuleListInitialized();
        syncWorkspaceToolbar();
      }
      if (isOpFlowModuleListLocked()) {
        const hasTemplateStack = opFlowVisitStack.some((v) => v.templateStep && v.snapshot);
        if (!hasTemplateStack) {
          syncOpFlowStackToModuleList();
        }
      } else {
        dedupeOpFlowVisitStack();
      }

      const useStackOnly =
        isOpFlowModuleListLocked() || (isProcessDevWorkspace() && opFlowVisitStack.length > 0);

      if (selectedLeafId == null) {
        if (opFlowVisitStack.length) {
          renderOpFlowStackSections();
        } else {
          opFlowStepBadgeEl.textContent = `${opFlowTotalStepCount()}步`;
          const ph = document.createElement("div");
          ph.className = "op-flow-placeholder";
          ph.textContent = "请在左侧选择一个任务节点。";
          opListEl.appendChild(ph);
          syncOpFlowClearButton();
          syncOpFlowSaveButton();
        }
        return;
      }

      if (useStackOnly) {
        renderOpFlowStackSections();
        return;
      }

      if (opFlowVisitStack.length === 0) {
        if (selectedLeafId !== "physical-modeling") {
          opFlowStepBadgeEl.textContent = `${opFlowTotalStepCount()}步`;
          if (selectedLeafId === "business-modeling") {
            opListEl.appendChild(
              buildGenericOpFlowSection(
                getNavLeafLabel(selectedLeafId) || "业务建模",
                businessModelingFlowState,
                "legacy-other",
                -1,
                selectedLeafId
              )
            );
            syncOpFlowClearButton();
            syncOpFlowSaveButton();
            return;
          }
          if (selectedLeafId === "smart-dev") {
            opListEl.appendChild(
              buildGenericOpFlowSection(
                getNavLeafLabel(selectedLeafId) || "智能开发",
                smartDevFlowState,
                "legacy-other",
                -1,
                selectedLeafId,
                { inProgress: smartDevScriptEditorActive }
              )
            );
            syncOpFlowClearButton();
            syncOpFlowSaveButton();
            return;
          }
          const section = document.createElement("div");
          section.className = "op-flow-section";
          const head = document.createElement("div");
          head.className = "op-flow-section-head";
          const title = document.createElement("div");
          title.className = "op-flow-section-title";
          title.textContent = getNavLeafLabel(selectedLeafId);
          head.appendChild(title);
          attachOpFlowSectionNavigation(section, head, selectedLeafId);
          const actions = document.createElement("div");
          actions.className = "op-flow-section-actions";
          attachOpFlowVisitDeleteButton(actions, "legacy-other", -1);
          head.appendChild(actions);
          section.appendChild(head);
          opListEl.appendChild(section);
          syncOpFlowClearButton();
          syncOpFlowSaveButton();
          return;
        }
        opFlowStepBadgeEl.textContent = `${opFlowTotalStepCount()}步`;
        if (devPathFlowState && devPathFlowState.groupByNavTitle && !isProcessDevWorkspace()) {
          opListEl.appendChild(
            buildBusinessDevPathSections(devPathFlowState, physicalFlowState, true, "legacy-physical", -1)
          );
        } else {
          opListEl.appendChild(
            buildPhysicalOpFlowSection(
              getNavLeafLabel(selectedLeafId) || "物理建模",
              devPathFlowState,
              physicalFlowState,
              true,
              "legacy-physical",
              -1,
              selectedLeafId
            )
          );
        }
        syncOpFlowClearButton();
        syncOpFlowSaveButton();
        return;
      }

      renderOpFlowStackSections();
    }

    function getOpFlowClearStatsFromLiveGlobals() {
      if (selectedLeafId === "business-modeling" && businessModelingFlowState.nodes.length) {
        let actions = 0;
        let resources = 0;
        businessModelingFlowState.nodeKinds.forEach((kind) => {
          if (kind === "resource") resources += 1;
          else actions += 1;
        });
        return { actions, resources, total: actions + resources };
      }
      if (selectedLeafId === "smart-dev" && smartDevFlowState.nodes.length) {
        let actions = 0;
        let resources = 0;
        (smartDevFlowState.nodeKinds || []).forEach((kind) => {
          if (kind === "resource") resources += 1;
          else actions += 1;
        });
        return { actions, resources, total: actions + resources };
      }
      if (devPathFlowState && devPathFlowState.nodes && devPathFlowState.nodes.length) {
        const kinds = devPathFlowState.nodeKinds || [];
        let actions = 0;
        let resources = 0;
        devPathFlowState.nodes.forEach((_, i) => {
          if (kinds[i] === "resource") resources += 1;
          else actions += 1;
        });
        return { actions, resources, total: actions + resources };
      }
      if (physicalFlowState.reverse) {
        const resources = physicalFlowState.tables.length;
        return { actions: 1, resources, total: 1 + resources };
      }
      if (physicalFlowState.tables.length) {
        const resources = physicalFlowState.tables.length;
        return { actions: 1, resources, total: 1 + resources };
      }
      return { actions: 0, resources: 0, total: 0 };
    }

    function getOpFlowClearStatsFromSnapshot(snap) {
      if (!snap) return { actions: 0, resources: 0, total: 0 };
      if (snap.moduleFlow && snap.moduleFlow.nodes && snap.moduleFlow.nodes.length) {
        let actions = 0;
        let resources = 0;
        (snap.moduleFlow.nodeKinds || []).forEach((kind) => {
          if (kind === "resource") resources += 1;
          else actions += 1;
        });
        return { actions, resources, total: actions + resources };
      }
      if (snap.business && snap.business.nodes && snap.business.nodes.length) {
        let actions = 0;
        let resources = 0;
        (snap.business.nodeKinds || []).forEach((kind) => {
          if (kind === "resource") resources += 1;
          else actions += 1;
        });
        return { actions, resources, total: actions + resources };
      }
      if (snap.smartDev && snap.smartDev.nodes && snap.smartDev.nodes.length) {
        let actions = 0;
        let resources = 0;
        (snap.smartDev.nodeKinds || []).forEach((kind) => {
          if (kind === "resource") resources += 1;
          else actions += 1;
        });
        return { actions, resources, total: actions + resources };
      }
      const devPath = snap.devPath;
      const physical = snap.physical || { reverse: false, tables: [] };
      if (devPath && devPath.nodes && devPath.nodes.length) {
        const kinds = devPath.nodeKinds || [];
        let actions = 0;
        let resources = 0;
        devPath.nodes.forEach((_, i) => {
          if (kinds[i] === "resource") resources += 1;
          else actions += 1;
        });
        return { actions, resources, total: actions + resources };
      }
      if (physical.reverse) {
        const resources = (physical.tables || []).length;
        return { actions: 1, resources, total: 1 + resources };
      }
      if ((physical.tables || []).length) {
        const resources = (physical.tables || []).length;
        return { actions: 1, resources, total: 1 + resources };
      }
      return { actions: 0, resources: 0, total: 0 };
    }

    function getOpFlowClearStats() {
      if (opFlowVisitStack.length === 0) {
        return getOpFlowClearStatsFromLiveGlobals();
      }
      let actions = 0;
      let resources = 0;
      let total = 0;
      opFlowVisitStack.forEach((visit, i) => {
        if (
          visit.leafId !== "physical-modeling" &&
          visit.leafId !== "business-modeling" &&
          visit.leafId !== "smart-dev"
        )
          return;
        const isLive = isOpFlowVisitLive(visit);
        let st;
        if (isLive) st = getOpFlowClearStatsFromLiveGlobals();
        else if (visit.snapshot) st = getOpFlowClearStatsFromSnapshot(visit.snapshot);
        else st = { actions: 0, resources: 0, total: 0 };
        actions += st.actions;
        resources += st.resources;
        total += st.total;
      });
      return { actions, resources, total };
    }

    function closeOpFlowClearModal() {
      const el = document.getElementById("opFlowClearBackdrop");
      if (el) el.hidden = true;
    }

    function ensureOpFlowClearModal() {
      if (document.getElementById("opFlowClearBackdrop")) return;
      const backdrop = document.createElement("div");
      backdrop.id = "opFlowClearBackdrop";
      backdrop.className = "op-clear-backdrop";
      backdrop.hidden = true;
      const dialog = document.createElement("div");
      dialog.className = "op-clear-dialog";
      dialog.setAttribute("role", "dialog");
      dialog.setAttribute("aria-modal", "true");
      dialog.addEventListener("click", (e) => e.stopPropagation());
      const p = document.createElement("p");
      p.className = "op-clear-dialog-msg";
      p.textContent =
        "当前流程未保存，清空后流程列表，但操作过程的生成的资源不会删除。";
      const ft = document.createElement("div");
      ft.className = "op-clear-dialog-ft";
      const bFlow = document.createElement("button");
      bFlow.type = "button";
      bFlow.className = "op-clear-btn op-clear-btn--flow";
      bFlow.textContent = "删除流程";
      const bAll = document.createElement("button");
      bAll.type = "button";
      bAll.className = "op-clear-btn op-clear-btn--all";
      bAll.textContent = "删除流程及所有生成资源";
      const bCancel = document.createElement("button");
      bCancel.type = "button";
      bCancel.className = "op-clear-btn";
      bCancel.textContent = "取消";
      bFlow.addEventListener("click", () => executeOpFlowClear("flow-only"));
      bAll.addEventListener("click", () => executeOpFlowClear("flow-and-resources"));
      bCancel.addEventListener("click", () => closeOpFlowClearModal());
      ft.appendChild(bFlow);
      ft.appendChild(bAll);
      ft.appendChild(bCancel);
      dialog.appendChild(p);
      dialog.appendChild(ft);
      backdrop.appendChild(dialog);
      backdrop.addEventListener("click", () => closeOpFlowClearModal());
      document.body.appendChild(backdrop);
    }

    function openOpFlowClearModal() {
      ensureOpFlowClearModal();
      document.getElementById("opFlowClearBackdrop").hidden = false;
    }

    function executeOpFlowClear(mode) {
      const st = getOpFlowClearStats();
      opFlowModuleLeafIds = [];
      opFlowVisitStack.length = 0;
      physicalFlowState = { reverse: false, tables: [] };
      businessModelingFlowState = { nodes: [], nodeKinds: [] };
      smartDevFlowState = { nodes: [], nodeKinds: [] };
      smartDevListSavedRows = [];
      smartDevScriptEditorActive = false;
      devPathFlowState = null;
      resetOpFlowBusinessProcessContext();
      if (physicalCanvasMode === "reverse-modeling") {
        physicalCanvasMode = "list";
        reverseModelingStep = 1;
        syncCanvas();
      }
      renderOperationFlow();
      closeOpFlowClearModal();
      if (mode === "flow-only") {
        showToast(`已删除${st.total}个操作和0个资源`, "success", 3400);
      } else {
        showToast(`已删除${st.actions}个操作和${st.resources}个资源`, "success", 3400);
      }
    }

    function appendOperation(op) {
      count += 1;
      const badge = document.getElementById("canvasBadge");
      if (badge) badge.textContent = `操作次数：${count}`;
      const hint = document.getElementById("canvasHint");
      if (hint) hint.textContent = `最近一次操作：${op.label}`;
    }

    let toastTimer;
    function showToast(text, kind = "success", durationMs = 2600) {
      if (!appToastEl) return;
      appToastEl.textContent = text;
      appToastEl.className = "app-toast app-toast--" + kind;
      appToastEl.hidden = false;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        appToastEl.hidden = true;
      }, durationMs);
    }

    function readStoredProcesses() {
      try {
        const raw = localStorage.getItem(BP_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function writeStoredProcesses(arr) {
      localStorage.setItem(BP_STORAGE_KEY, JSON.stringify(arr));
    }

    function flowNodesFromStored(item) {
      if (item.flowModules && item.flowModules.length) {
        syncLegacyFlowFieldsFromModules(item);
        return item.flowNodes.slice();
      }
      if (item.flowNodes && item.flowNodes.length) return item.flowNodes;
      const nodes = ["物理建模"];
      if (item.flow && item.flow.reverse) nodes.push("逆向建模");
      (item.flow && item.flow.tables ? item.flow.tables : []).forEach((t) => nodes.push(t));
      return nodes;
    }

    function snapshotAllOpFlowVisits() {
      opFlowVisitStack.forEach((visit) => {
        if (visit && visit.leafId) trySnapshotLastVisitForLeaf(visit.leafId);
      });
    }

    function buildFlowModulesFromOpStack() {
      if (!opFlowVisitStack.length) return [];
      return opFlowVisitStack.map((visit) => {
        const snap = visit.snapshot || captureOpSnapshotForLeaf(visit.leafId);
        const flow = snap.moduleFlow || snap.business || snap.smartDev || { nodes: [], nodeKinds: [] };
        const normalized = normalizeModuleFlowState(flow, {
          leafId: visit.leafId,
          label: visit.operationLabel,
        });
        const kind = getNavResourceKind(visit.leafId);
        let actionLabel = visit.operationLabel || "";
        const resources = [];
        (normalized.nodes || []).forEach((name, ri) => {
          const nodeKind = (normalized.nodeKinds || [])[ri];
          if (nodeKind === "action" || nodeKind === "section") {
            if (!actionLabel) actionLabel = name;
            return;
          }
          resources.push({
            id: "saved_" + visit.leafId + "_" + ri,
            kind,
            name,
            fromNode: actionLabel || getDefaultOperationLabelForLeaf(visit.leafId),
            leafId: visit.leafId,
            status: "online",
          });
        });
        return {
          leafId: visit.leafId,
          label: actionLabel || getDefaultOperationLabelForLeaf(visit.leafId),
          resources,
        };
      });
    }

    function saveExistingBusinessProcessFlow() {
      if (!opFlowFromBusinessProcess || !opFlowSourceProcessItem) return false;
      if (opFlowTotalStepCount() === opFlowBaselineStepCount) {
        showToast("当前操作步数无变更", "info");
        return false;
      }
      snapshotAllOpFlowVisits();
      const flowModules = buildFlowModulesFromOpStack();
      const source = opFlowSourceProcessItem;
      const id = source.id;
      let savedItem = source;

      if (String(id).startsWith("bp_")) {
        const list = readStoredProcesses();
        const idx = list.findIndex((x) => x.id === id);
        if (idx >= 0) {
          list[idx].flowModules = flowModules;
          syncLegacyFlowFieldsFromModules(list[idx]);
          list[idx].updateTime = new Date().toISOString().slice(0, 10);
          writeStoredProcesses(list);
          savedItem = list[idx];
        } else {
          source.flowModules = flowModules;
          syncLegacyFlowFieldsFromModules(source);
          source.updateTime = new Date().toISOString().slice(0, 10);
        }
      } else {
        demoBpFlowModulesOverrides[id] = JSON.parse(JSON.stringify(flowModules));
        source.flowModules = flowModules;
        syncLegacyFlowFieldsFromModules(source);
        source.updateTime = new Date().toISOString().slice(0, 10);
      }

      opFlowSourceProcessItem = savedItem;
      devPathFlowState = buildDevPathStateFromModules(savedItem, flowModules);
      opFlowVisitStack.forEach((visit, i) => {
        const module = flowModules[i];
        if (!module) return;
        visit.operationLabel = getModuleOperationLabel(module);
        visit.snapshot = buildModuleOpSnapshot(module);
        visit.fromBusinessProcess = true;
      });
      applyModuleToLiveState(flowModules.find((m) => m.leafId === selectedLeafId) || flowModules[0]);
      opFlowBaselineStepCount = opFlowTotalStepCount();
      syncOpFlowSaveButton();
      renderOperationFlow();
      if (shouldShowBpResourceOverview()) syncCanvas();
      appendOperation({
        id: "bp-save-" + id,
        label: "业务流程 · " + (getBpDisplayTitle(savedItem) || "保存操作流程"),
      });
      showToast("操作流程已保存", "success");
      return true;
    }

    function saveCurrentFlowAsBusinessProcess(meta) {
      if (selectedLeafId !== "physical-modeling") {
        showToast("请在「物理建模」页面保存当前流程", "warn");
        return false;
      }
      const list = readStoredProcesses();
      const title =
        meta && meta.title && String(meta.title).trim()
          ? String(meta.title).trim()
          : "业务流程 · " + nowLabel();
      const item = {
        id: "bp_" + Date.now(),
        title,
        flow: JSON.parse(JSON.stringify(physicalFlowState)),
        favorite: !!(meta && meta.favorite),
        isTemplate: !!(meta && meta.isTemplate),
        source: "运行期自建",
        creator: "我",
        updateTime: new Date().toISOString().slice(0, 10),
        collaborators: "—",
        collaboratorIds: [],
        boardId: meta && meta.boardId ? String(meta.boardId) : "",
        domain: meta && meta.domain != null ? String(meta.domain) : "",
      };
      if (opFlowVisitStack.length) {
        item.flowModules = buildFlowModulesFromOpStack();
      } else if (devPathFlowState && devPathFlowState.nodes && devPathFlowState.nodes.length) {
        item.flowModules = migrateLegacyFlowToModules({
          flowNodes: devPathFlowState.nodes.slice(),
          nodeKinds: (devPathFlowState.nodeKinds || []).slice(),
        });
      }
      syncLegacyFlowFieldsFromModules(item);
      list.unshift(item);
      attachBpOutcomesToItem(item);
      writeStoredProcesses(list);
      appendOperation({ id: "flow-save", label: "操作流程 · 保存为业务流程" });
      showToast("已将当前操作流程保存为业务流程");
      return true;
    }

    function isFullPageHubMode() {
      return (
        centerOverride === "scene-panorama" ||
        centerOverride === "business-processes" ||
        centerOverride === "template-center" ||
        centerOverride === "template-editor"
      );
    }

    function isScenePanoramaMode() {
      return centerOverride === "scene-panorama";
    }

    function isBusinessProcessesMode() {
      return centerOverride === "business-processes";
    }

    function isTemplateCenterMode() {
      return centerOverride === "template-center";
    }

    function isTemplateEditorMode() {
      return centerOverride === "template-editor";
    }

    function isProcessDevWorkspace() {
      return centerOverride === null;
    }

    function syncMainLayout() {
      const hub = isFullPageHubMode();
      const workspace = isProcessDevWorkspace();
      if (mainLayoutEl) {
        mainLayoutEl.classList.toggle("main--hub", hub);
        mainLayoutEl.classList.toggle("main--workspace", workspace);
      }
      document.body.classList.toggle("main--workspace-mode", workspace);
      syncWorkspaceToolbar();
      syncNavPanelCollapsed();
    }

    function runAppPageTransition(transitionClass, applyState) {
      if (!mainLayoutEl || appPageTransitionLock) {
        applyState();
        return;
      }
      appPageTransitionLock = true;
      mainLayoutEl.classList.add("main--transitioning", transitionClass);
      document.body.classList.add("main--transitioning", transitionClass);
      window.setTimeout(() => {
        applyState();
        mainLayoutEl.classList.remove(transitionClass);
        document.body.classList.remove(transitionClass);
        const enterClass =
          transitionClass === "main--leave-hub" ? "main--enter-workspace" : "main--enter-hub";
        mainLayoutEl.classList.add(enterClass);
        document.body.classList.add(enterClass);

    /** 从模板生成一条普通流程（非模板），继承分类与流程结构，名称含「复制」与来源模板标注 */
    function createBpCopyFromTemplate(templateItem) {
      const tplTitle = getBpTemplateBaseTitle(templateItem);
      const newTitle = tplTitle + "复制（来源模板：" + tplTitle + "）";
      const list = readStoredProcesses();
      const copy = {
        id: "bp_" + Date.now(),
        title: newTitle,
        favorite: !!templateItem.favorite,
        isTemplate: false,
        sourceTemplateId: templateItem.id,
        source: templateItem.source || "运行期自建",
        creator: templateItem.creator || "我",
        updateTime: new Date().toISOString().slice(0, 10),
        collaborators: templateItem.collaborators || "—",
        collaboratorIds: Array.isArray(templateItem.collaboratorIds)
          ? templateItem.collaboratorIds.slice()
          : [],
        boardId: resolveBpBoardDomain(templateItem).boardId,
        domain: resolveBpBoardDomain(templateItem).domain,
      };
      if (templateItem.flow) {
        try {
          copy.flow = JSON.parse(JSON.stringify(templateItem.flow));
        } catch {
          /* ignore */
        }
      }
      if (templateItem.flowModules && templateItem.flowModules.length) {
        copy.flowModules = JSON.parse(JSON.stringify(templateItem.flowModules));
        syncLegacyFlowFieldsFromModules(copy);
      } else if (templateItem.flowNodes && templateItem.flowNodes.length) {
        copy.flowNodes = templateItem.flowNodes.slice();
        if (templateItem.nodeKinds && templateItem.nodeKinds.length) {
          copy.nodeKinds = templateItem.nodeKinds.slice();
        }
        copy.flowModules = getBpFlowModules(copy);
        syncLegacyFlowFieldsFromModules(copy);
      }
      if (templateItem.valueSummary) copy.valueSummary = templateItem.valueSummary;
      attachBpOutcomesToItem(copy);
      list.unshift(copy);
      writeStoredProcesses(list);
      return copy;
    }

    function removeBpItem(id) {
      if (String(id).startsWith("bp_")) {
        writeStoredProcesses(readStoredProcesses().filter((x) => x.id !== id));
      } else {
        demoDeletedIds.add(id);

    function getBpDisplayTitle(item) {
      if (!item || item.id == null) return "";
      if (String(item.id).startsWith("bp_")) {
        return String(item.title || "").trim() || "未命名流程";
      }
      const o = demoBpTitleOverrides[item.id];
      if (o != null && String(o).trim() !== "") return String(o).trim();
      return String(item.title || "").trim() || "未命名流程";
    }

    function splitBpTitleSuffix(fullTitle) {
      const t = String(fullTitle ?? "");
      const marker = "（来源模板：";
      const idx = t.indexOf(marker);
      if (idx === -1) return { main: t, suffix: null };
      return { main: t.slice(0, idx), suffix: t.slice(idx) };
    }

    function getBpTemplateBaseTitle(item) {
      const fullTitle = getBpDisplayTitle(item).trim() || "未命名流程";
      const parts = splitBpTitleSuffix(fullTitle);
      return String(parts.main || "").trim() || fullTitle;
    }

    /** 从「（来源模板：名称）」中取出展示用模板名称 */
    function getBpSourceTemplateNameFromSuffix(suffix) {
      const s = String(suffix || "");
      const pref = "（来源模板：";
      if (s.startsWith(pref) && s.endsWith("）")) return s.slice(pref.length, -1);
      return s;
    }

    function countBpTemplateCopies(templateItem) {
      if (!templateItem || !templateItem.id) return 0;
      const baseTitle = getBpTemplateBaseTitle(templateItem);
      const marker = "（来源模板：" + baseTitle + "）";
      const all = [...readStoredProcesses(), ...getBpDemoPresets()].filter(
        (x) => !demoDeletedIds.has(x.id) && x.id !== templateItem.id
      );
      return all.filter((row) => {
        if (row.sourceTemplateId === templateItem.id) return true;
        return getBpDisplayTitle(row).includes(marker);
      }).length;
    }

    function getBpCopyCount(item) {
      if (typeof item.copyCount === "number") return item.copyCount;
      if (isBpTemplate(item)) return countBpTemplateCopies(item);
      return 0;
    }

    function hasBpCollaborators(item) {
      if (item.collaboratorIds && item.collaboratorIds.length) return true;
      return !!(item.collaborators && item.collaborators !== "—");
    }

    function buildBpScopeTags(item) {
      const bd = resolveBpBoardDomain(item);
      const tags = [
        { label: getBpBoardLabel(bd.boardId) || "未分类", kind: "default" },
        { label: bd.domain || "未指定业务域", kind: "default" },
      ];
      const collabCount =
        (item.collaboratorIds && item.collaboratorIds.length) ||
        (item.collaborators && item.collaborators !== "—"
          ? String(item.collaborators).split("、").length
          : 0);
      if (collabCount > 0) {
        tags.push({ label: "协作 " + collabCount + " 人", kind: "collab" });
      }
      return tags;
    }

    function persistBpTitle(item, raw) {
      const next = String(raw || "").trim();
      if (!next || !item || item.id == null) return false;
      if (String(item.id).startsWith("bp_")) {
        const list = readStoredProcesses();
        const idx = list.findIndex((x) => x.id === item.id);
        if (idx >= 0) {
          list[idx].title = next;
          writeStoredProcesses(list);
        }
        return true;
      }
      demoBpTitleOverrides[item.id] = next;
      return true;
    }

    function formatCollaboratorsLine(names) {
      if (!names || !names.length) return "—";
      const head = names.slice(0, 5);
      const more = names.length > 5;
      return head.join("、") + (more ? "…" : "");
    }

    function getCollaboratorNamesFromItem(item) {
      if (item.collaboratorIds && item.collaboratorIds.length) {
        return item.collaboratorIds
          .map((cid) => BP_COOP_MOCK_USERS.find((u) => u.id === cid)?.name || "")
          .filter(Boolean);
      }
      return [];
    }

    function getCollaboratorsShortDisplay(item) {
      const names = getCollaboratorNamesFromItem(item);
      if (names.length) return formatCollaboratorsLine(names);
      if (item.collaborators && item.collaborators !== "—") return item.collaborators;
      return "—";
    }

    function persistItemCollaborators(item, ids) {
      const names = ids
        .map((cid) => BP_COOP_MOCK_USERS.find((u) => u.id === cid))
        .filter(Boolean)
        .map((u) => u.name);
      item.collaboratorIds = [...ids];
      item.collaborators = formatCollaboratorsLine(names);
      if (String(item.id).startsWith("bp_")) {
        const list = readStoredProcesses();
        const idx = list.findIndex((x) => x.id === item.id);
        if (idx >= 0) {
          list[idx].collaboratorIds = [...ids];
          list[idx].collaborators = item.collaborators;
          writeStoredProcesses(list);
        }
      }
    }

    function bpItemHash(item) {
      let h = 0;
      const s = String((item && item.id) || (item && item.title) || "");
      for (let i = 0; i < s.length; i += 1) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
      return Math.abs(h);
    }

    function inferOutcomeFlagsFromNodes(nodes) {
      const text = nodes.join(" ");
      return {
        hasModel: /建模|ODS|视图|StartRocks|物理|逻辑|逆向/i.test(text),
        hasTask: /任务|开发|集成|离线|实时|ETL/i.test(text),
        hasApi: /API/i.test(text),
        hasReport: /报告|看板|报表/i.test(text),
      };
    }

    function mapFlowNodeToOutcomeKind(nodeLabel) {
      const lab = String(nodeLabel || "");
      if (/API/i.test(lab)) return "apis";
      if (/报告|看板|报表/i.test(lab)) return "reports";
      if (/任务|离线|集成|ETL|开发/i.test(lab)) return "tasks";
      return "models";
    }

    function getFlowNodesForOutcomeKind(item, kind) {
      const nodes = flowNodesFromStored(item);
      const matched = nodes.filter((n) => mapFlowNodeToOutcomeKind(n) === kind);
      if (matched.length) return matched;
      if (kind === "models") return nodes.filter((n) => mapFlowNodeToOutcomeKind(n) === "models");
      if (kind === "tasks") return ["离线任务"];
      if (kind === "apis") return ["API开发"];
      if (kind === "reports") return ["制作报告"];
      return nodes.length ? [nodes[0]] : ["流程节点"];
    }

    function computeBpOutcomes(item) {
      if (item.outcomes && item.outcomeStats && item.flowModules) {
        return { outcomes: item.outcomes, stats: item.outcomeStats };
      }
      const modules = getBpFlowModules(item);
      const outcomes = emptyBpResourceOutcomes();
      modules.forEach((m) => {
        (m.resources || []).forEach((r) => {
          const k = r.kind || getNavResourceKind(m.leafId);
          if (outcomes[k]) outcomes[k].push(r);
        });
      });
      const stats = {
        models: outcomes.models.length,
        tasks: outcomes.tasks.length + outcomes.taskInstances.length,
        apis: outcomes.apis.length,
        reports: outcomes.reports.length,
      };
      return { outcomes, stats };
    }

    function renderBpResStatusBadge(kind, statusKey, mini) {
      const def = (BP_RES_STATUS[kind] && BP_RES_STATUS[kind][statusKey]) || {
        label: statusKey || "—",
        tone: "default",
      };
      const span = document.createElement("span");
      span.className =
        "bp-res-status bp-res-status--" +
        def.tone +
        (mini ? " bp-res-status--mini" : "");
      span.textContent = def.label;
      return span;
    }

    function getBpResourceActions(kind, row) {
      const common = ["血缘", "详情"];
      if (kind === "models") {
        return row.status === "online"
          ? common.concat(["下线"])
          : common.concat(["上线"]);
      }
      if (kind === "tasks") {
        const extra =
          row.status === "failed" ? ["查看日志", "重跑"] : ["调度配置", "手动运行"];
        return common.concat(extra);
      }
      if (kind === "apis") {
        return row.status === "published"
          ? common.concat(["下线"])
          : common.concat(["发布"]);
      }
      return row.status === "published"
        ? common.concat(["预览"])
        : common.concat(["预览", "发布"]);
    }

    function summarizeOutcomeStatuses(kind, list) {
      const summary = [];
      const counts = Object.create(null);
      list.forEach((row) => {
        const tone =
          (BP_RES_STATUS[kind] &&
            BP_RES_STATUS[kind][row.status] &&
            BP_RES_STATUS[kind][row.status].tone) ||
          "default";
        counts[tone] = (counts[tone] || 0) + 1;
      });
      if (counts.error) summary.push({ tone: "error", text: counts.error + " 异常" });
      if (counts.warning) summary.push({ tone: "warning", text: counts.warning + " 待处理" });
      if (counts.processing) summary.push({ tone: "processing", text: counts.processing + " 运行中" });
      return summary;
    }

    function getBpValueSummary(item) {
      if (item.valueSummary) return item.valueSummary;
      const bd = resolveBpBoardDomain(item);
      const board = getBpBoardLabel(bd.boardId) || "业务";
      const domain = bd.domain || "专题";
      const templates = [
        "统一" + domain + "口径，支撑" + board + "经营分析与决策",
        "沉淀" + domain + "数据资产，提升" + board + "交付效率",
        "打通" + domain + "建管用最短路径，复用已有模型与任务能力",
      ];
      return templates[bpItemHash(item) % templates.length];
    }

    function attachBpOutcomesToItem(item) {
      if (!item.flowModules || !item.flowModules.length) {
        item.flowModules = getBpFlowModules(item);
        syncLegacyFlowFieldsFromModules(item);
      }
      const { outcomes, stats } = computeBpOutcomes(item);
      item.outcomes = outcomes;
      item.outcomeStats = stats;
      if (!item.valueSummary) item.valueSummary = getBpValueSummary(item);
      return item;
    }

    function aggregateBpListStats(rows) {
      let models = 0;
      let tasks = 0;
      let apis = 0;
      let reports = 0;
      const boards = new Set();
      rows.forEach((item) => {
        const { stats } = computeBpOutcomes(item);
        models += stats.models;
        tasks += stats.tasks;

        reports += stats.reports;

    function buildBpResourceLineageTree(resources) {
      if (!resources.length) return null;
      const nodes = resources.map((resource) => ({ ...resource, children: [] }));
      const byModule = new Map();
      resources.forEach((resource, index) => {
        if (!byModule.has(resource.moduleIndex)) byModule.set(resource.moduleIndex, []);
        byModule.get(resource.moduleIndex).push(index);
      });
      const sortedModules = [...byModule.keys()].sort((a, b) => a - b);
      if (!sortedModules.length) return nodes[0];

      const rootIdx = byModule.get(sortedModules[0])[0];
      let prevIndices = [rootIdx];

      sortedModules.slice(1).forEach((moduleIndex) => {
        const currIndices = byModule.get(moduleIndex) || [];
        const parents = prevIndices.length ? prevIndices : [rootIdx];
        const nextIndices = [];
        currIndices.forEach((resIdx, childIndex) => {
          const parentIdx = parents[Math.min(childIndex, parents.length - 1)];
          if (parentIdx !== resIdx && !nodes[parentIdx].children.includes(nodes[resIdx])) {
            nodes[parentIdx].children.push(nodes[resIdx]);
          }
          nextIndices.push(resIdx);
        });
        prevIndices = nextIndices.length ? nextIndices : prevIndices;
      });

      const firstModuleIndices = byModule.get(sortedModules[0]) || [rootIdx];
      firstModuleIndices.slice(1).forEach((resIdx) => {
        if (resIdx !== rootIdx && !nodes[rootIdx].children.includes(nodes[resIdx])) {
          nodes[rootIdx].children.push(nodes[resIdx]);
        }
      });

      return nodes[rootIdx];
    }

      }
      if (kind === "reports") {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4h8a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V6a2 2 0 0 1 2-2z"/><path d="M10 9h4M10 13h4"/></svg>';
      }
      if (kind === "scripts") {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6l-4 4 4 4"/><path d="M16 18l4-4-4-4"/><path d="M13 4l-2 16"/></svg>';
      }
      if (kind === "sessions") {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8h10M7 12h6"/><path d="M6 4h12a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-3 3V6a2 2 0 0 1 2-2z"/></svg>';
      }
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 20V8l6-4 6 4v12"/><path d="M9 20v-6h6v6"/><path d="M9 10h6"/></svg>';
    }

    function layoutBpResourceLineageTree(root, metrics) {
      const m = metrics || getBpLineageLayoutMetrics(false);
      let leafRow = 0;
      function assignRows(node) {
        if (!node.children || !node.children.length) {
          node.layoutRow = leafRow;
          leafRow += 1;
          return;
        }
        node.children.forEach(assignRows);
        const rows = node.children.map((child) => child.layoutRow);
        node.layoutRow = (Math.min(...rows) + Math.max(...rows)) / 2;
      }
      assignRows(root);

      function assignColumns(node, depth) {
        node.layoutCol = depth;
        (node.children || []).forEach((child) => assignColumns(child, depth + 1));
      }
      assignColumns(root, 0);

      function toPixels(node) {
        node.layoutX = m.pad + node.layoutCol * (m.nodeW + m.gapX);
        node.layoutY = m.pad + node.layoutRow * (m.nodeH + m.gapY);
        (node.children || []).forEach(toPixels);
      }
      toPixels(root);

      const maxCol = (function walkMaxCol(node) {
        let max = node.layoutCol || 0;
        (node.children || []).forEach((child) => {
          max = Math.max(max, walkMaxCol(child));
        });
        return max;
      })(root);

      const width = m.pad * 2 + (maxCol + 1) * m.nodeW + maxCol * m.gapX;
      const height =
        m.pad * 2 + leafRow * m.nodeH + Math.max(0, leafRow - 1) * m.gapY;
      const layout = { root, width, height, leafCount: leafRow, metrics: m };
      finalizeBpLineageGraphBounds(layout);
      return layout;
    }

    function finalizeBpLineageGraphBounds(layout) {
      const m = layout.metrics;
      const portPad = 18;
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      function walk(node) {
        minX = Math.min(minX, node.layoutX);
        minY = Math.min(minY, node.layoutY);
        maxX = Math.max(maxX, node.layoutX + m.nodeW);
        maxY = Math.max(maxY, node.layoutY + m.nodeH);
        (node.children || []).forEach(walk);
      }
      walk(layout.root);

      const offsetX = portPad - minX;
      const offsetY = portPad - minY;
      if (offsetX || offsetY) {
        function shift(node) {
          node.layoutX += offsetX;
          node.layoutY += offsetY;
          (node.children || []).forEach(shift);
        }
        shift(layout.root);
        maxX += offsetX;
        maxY += offsetY;
      }

      layout.width = Math.ceil(maxX + portPad);
      layout.height = Math.ceil(maxY + portPad);
    }

    function countBpLineageNodes(root) {
      let count = 0;
      (function walk(node) {
        count += 1;
        (node.children || []).forEach(walk);
      })(root);
      return count;
    }

    function collectBpLineageEdges(node, edges, metrics) {
      const m = metrics || getBpLineageLayoutMetrics(false);
      const list = edges || [];
      const x1 = node.layoutX + m.nodeW;
      const y1 = node.layoutY + m.nodeH / 2;
      (node.children || []).forEach((child) => {
        const x2 = child.layoutX;
        const y2 = child.layoutY + m.nodeH / 2;
        list.push({ x1, y1, x2, y2 });
        collectBpLineageEdges(child, list, m);
      });
      return list;
    }

    function buildBpLineageCardElement(node, hasParent, metrics, options) {

        const portOut = document.createElement("span");
        portOut.className = "bp-lineage-card__port bp-lineage-card__port--out";
        portOut.textContent = "−";
        portOut.setAttribute("aria-hidden", "true");
