    function navTextMatches(value) {
      const q = navSearchQuery.trim().toLowerCase();
      if (!q) return true;
      return String(value || "").toLowerCase().includes(q);
    }

    function getVisibleNavChildren(node) {
      const q = navSearchQuery.trim();
      if (!q) return node.children || [];

      const moduleScope = navSearchModuleScopeEl.checked;
      const resourceScope = navSearchResourceScopeEl.checked;
      const moduleMatched = moduleScope && navTextMatches(node.label);

      if (moduleMatched) return node.children || [];
      if (!resourceScope) return [];
      return (node.children || []).filter((child) => navTextMatches(child.label));
    }

    function shouldShowNavNode(node) {
      const q = navSearchQuery.trim();
      if (!q) return true;

      const moduleScope = navSearchModuleScopeEl.checked;
      const resourceScope = navSearchResourceScopeEl.checked;

      if (node.type === "leaf") {
        return moduleScope && navTextMatches(node.label);
      }

      return (moduleScope && navTextMatches(node.label)) ||
        (resourceScope && (node.children || []).some((child) => navTextMatches(child.label)));
    }

    function collectModuleSearchResults() {
      if (!navSearchModuleScopeEl.checked) return [];
      const results = [];
      navTree.forEach((node) => {
        if (navTextMatches(node.label)) {
          results.push({
            id: node.id,
            label: node.label,
            navLabel: node.label,
            icon: node.type === "group" ? "folder" : node.icon,
            type: node.type,
          });
        }
        if (node.type === "group") {
          node.children.forEach((child) => {
            if (navTextMatches(child.label)) {
              results.push({
                id: child.id,
                label: `${node.label} / ${child.label}`,
                navLabel: child.label,
                icon: child.icon,
                type: "leaf",
              });
            }
          });
        }
      });
      return results;
    }

    function collectResourceSearchResults() {
      if (!navSearchResourceScopeEl.checked) return [];
      const physicalResources = pmTableRows
        .filter((row) => [row.zh, row.en, row.type, row.domain, row.ds, row.owner].some((v) => navTextMatches(v)))
        .map((row) => ({
          id: "physical-modeling",
          label: `${row.zh} · 物理建模`,
          icon: "doc",
          searchValue: row.zh,
        }));
      const logicalResources = lmTableRows
        .filter((row) => [row.zh, row.en, row.type, row.domain, row.ds, row.owner].some((v) => navTextMatches(v)))
        .map((row) => ({
          id: "logical-modeling",
          label: `${row.zh} · 逻辑建模`,
          icon: "doc",
          searchValue: row.zh,
        }));
      const businessResources = businessKnowledgeRows
        .filter((row) => [row.name, row.type].some((v) => navTextMatches(v)))
        .map((row) => ({
          id: "business-modeling",
          label: `${row.name} · 业务建模`,
          icon: "doc",
          searchValue: row.name,
        }));
      const tableResources = physicalResources.concat(logicalResources).concat(businessResources);
      const liveResources = collectLiveOpFlowResourceMatches();
      return tableResources.concat(liveResources);
    }

    function collectLiveOpFlowResourceMatches() {
      if (!navSearchResourceScopeEl.checked) return [];
      const results = [];
      const leafIdSet = new Set();
      if (isProcessDevWorkspace() && opFlowModuleLeafIds.length) {
        opFlowModuleLeafIds.forEach((id) => leafIdSet.add(id));
      }
      getAllNavLeafIds().forEach((id) => {
        if (getNavResourceKind(id)) leafIdSet.add(id);
      });
      leafIdSet.forEach((leafId) => {
        const state = getLiveFlowStateForLeaf(leafId);
        (state.nodes || []).forEach((name, index) => {
          if ((state.nodeKinds || [])[index] !== "resource") return;
          if (!navTextMatches(name)) return;
          results.push({
            id: leafId,
            label: `${name} · ${getNavLeafLabel(leafId)}`,
            icon: "doc",
            searchValue: name,
          });
        });
      });
      return results;
    }

    function collectResourceSearchResultsGrouped() {
      const grouped = new Map();
      collectResourceSearchResults().forEach((item) => {
        const opId = item.id;
        const opName = getNavLeafLabel(opId) || opId;
        if (!grouped.has(opId)) {
          grouped.set(opId, {
            id: opId,
            label: opName,
            icon: item.icon || "doc",
            count: 0,
            items: [],
          });
        }
        const entry = grouped.get(opId);
        entry.count += 1;
        entry.items.push(item);
      });
      return Array.from(grouped.values()).sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, "zh"));
    }

    function makeSearchResultButton(result) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "nav-leaf" + (selectedLeafId === result.id ? " is-selected" : "");
      btn.appendChild(iconEl(result.icon || "doc"));
      const lab = document.createElement("span");
      lab.className = "nav-label";
      lab.textContent = result.label;
      btn.appendChild(lab);
      btn.addEventListener("click", () => {
        if (result.type === "group") {
          toggleGroup(result.id);
          return;
        }
        if (result.id === "physical-modeling" && result.searchValue) {
          pmTableSearchQuery = result.searchValue;
          physicalCanvasMode = "list";
        }
        if (result.id === "logical-modeling" && result.searchValue) {
          lmTableSearchQuery = result.searchValue;
          lmTablePage = 1;
        }
        selectLeaf({
          id: result.id,
          label: result.navLabel || result.label,
          icon: result.icon || "doc",
        });
      });
      return btn;
    }

    function makeResourceGroupResultButton(group) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "nav-leaf" + (selectedLeafId === group.id ? " is-selected" : "");
      btn.appendChild(iconEl(group.icon || "doc"));
      const lab = document.createElement("span");
      lab.className = "nav-label";
      lab.textContent = `${group.label}(${group.count})`;
      btn.appendChild(lab);
      btn.addEventListener("click", () => {
        const q = navSearchQuery.trim();
        if (group.id === "physical-modeling" && q) {
          pmTableSearchQuery = q;
          physicalCanvasMode = "list";
        }
        if (group.id === "logical-modeling" && q) {
          lmTableSearchQuery = q;
          lmTablePage = 1;
        }
        selectLeaf({
          id: group.id,
          label: group.label,
          icon: group.icon || "doc",
        });
      });
      return btn;
    }

    function renderSearchResultGroup(title, results) {
      const li = document.createElement("li");
      li.className = "nav-group";
      const folder = document.createElement("button");
      folder.type = "button";
      folder.className = "nav-folder";
      const caret = document.createElement("span");
      caret.className = "nav-caret";
      caret.textContent = "▾";
      folder.appendChild(caret);
      folder.appendChild(iconEl("folder"));
      const label = document.createElement("span");
      label.className = "nav-label";
      label.textContent = `${title}（${results.length}）`;
      folder.appendChild(label);
      li.appendChild(folder);

      const ul = document.createElement("ul");
      ul.className = "nav-children";
      if (results.length) {
        results.forEach((result) => {
          const child = document.createElement("li");
          child.appendChild(makeSearchResultButton(result));
          ul.appendChild(child);
        });
      } else {
        const empty = document.createElement("li");
        empty.className = "nav-empty";
        empty.textContent = "暂无匹配结果";
        ul.appendChild(empty);
      }
      li.appendChild(ul);
      navEl.appendChild(li);
    }

    function renderResourceSearchResultGroup(groups) {
      const totalCount = groups.reduce((sum, group) => sum + group.count, 0);
      const li = document.createElement("li");
      li.className = "nav-group";
      const folder = document.createElement("button");
      folder.type = "button";
      folder.className = "nav-folder";
      const caret = document.createElement("span");
      caret.className = "nav-caret";
      caret.textContent = "▾";
      folder.appendChild(caret);
      folder.appendChild(iconEl("folder"));
      const label = document.createElement("span");
      label.className = "nav-label";
      label.textContent = `资源（${totalCount}）`;
      folder.appendChild(label);
      li.appendChild(folder);

      const ul = document.createElement("ul");
      ul.className = "nav-children";
      if (groups.length) {
        groups.forEach((group) => {
          const child = document.createElement("li");
          child.appendChild(makeResourceGroupResultButton(group));
          ul.appendChild(child);
        });
      } else {
        const empty = document.createElement("li");
        empty.className = "nav-empty";
        empty.textContent = "暂无匹配结果";
        ul.appendChild(empty);
      }
      li.appendChild(ul);
      navEl.appendChild(li);
    }

    function renderNavSearchResults() {
      const moduleResults = collectModuleSearchResults();
      const resourceGroups = collectResourceSearchResultsGrouped();
      renderSearchResultGroup("操作", moduleResults);
      renderResourceSearchResultGroup(resourceGroups);
      if (!moduleResults.length && !resourceGroups.length) {
        const empty = document.createElement("li");
        empty.className = "nav-empty";
        empty.textContent = "未找到匹配的模块或资源";
        navEl.appendChild(empty);
      }
    }

    function renderNav(options) {
      const opts = options || {};
      if (!navEl) return;
      navEl.innerHTML = "";
      navEl.classList.toggle("nav-search-mode", Boolean(navSearchQuery.trim()));
      let renderedCount = 0;

      if (navSearchQuery.trim()) {
        renderNavSearchResults();
        syncCanvas();
        renderOperationFlow();
        return;
      }

      navTree.forEach((node) => {
        if (!shouldShowNavNode(node)) return;
        renderedCount += 1;

        if (node.type === "leaf") {
          const li = document.createElement("li");
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className =
            "nav-leaf" + (selectedLeafId != null && node.id === selectedLeafId ? " is-selected" : "");
          btn.appendChild(iconEl(node.icon));
          const lab = document.createElement("span");
          lab.className = "nav-label";
          lab.textContent = node.label;
          btn.appendChild(lab);
          btn.addEventListener("click", () => {
            navigateToNavLeaf(node.id);
          });
          li.appendChild(btn);
          navEl.appendChild(li);
          return;
        }

        const li = document.createElement("li");
        li.className = "nav-group" + (node.activeGroup ? " is-active" : "");
        li.setAttribute("role", "group");

        const folder = document.createElement("button");
        folder.type = "button";
        folder.className = "nav-folder";
        const caret = document.createElement("span");
        caret.className = "nav-caret";
        caret.textContent = node.expanded ? "▾" : "▸";
        folder.appendChild(caret);
        folder.appendChild(iconEl("folder"));
        const flab = document.createElement("span");
        flab.className = "nav-label";
        flab.textContent = node.label;
        folder.appendChild(flab);
        folder.addEventListener("click", () => toggleGroup(node.id));
        li.appendChild(folder);

        const visibleChildren = getVisibleNavChildren(node);
        const forceExpandedBySearch = Boolean(navSearchQuery.trim());
        if ((node.expanded || forceExpandedBySearch) && visibleChildren.length) {
          const ul = document.createElement("ul");
          ul.className = "nav-children";
          ul.setAttribute("role", "group");
          visibleChildren.forEach((child) => {
            const cli = document.createElement("li");
            const cbtn = document.createElement("button");
            cbtn.type = "button";
            cbtn.className =
              "nav-leaf" + (selectedLeafId != null && child.id === selectedLeafId ? " is-selected" : "");
            cbtn.appendChild(iconEl(child.icon));
            const clab = document.createElement("span");
            clab.className = "nav-label";
            clab.textContent = child.label;
            cbtn.appendChild(clab);
            cbtn.addEventListener("click", (e) => {
              e.stopPropagation();
              selectLeaf(child);
            });
            cli.appendChild(cbtn);
            ul.appendChild(cli);
          });
          li.appendChild(ul);
        }

        navEl.appendChild(li);
      });

      if (!renderedCount) {
        const empty = document.createElement("li");
        empty.className = "nav-empty";
        empty.textContent = "未找到匹配的模块或资源";
        navEl.appendChild(empty);
      }

      if (!opts.skipSyncCanvas) {
        syncCanvas();
      }
      renderOperationFlow();
    }

    function bindAppEvents() {
      bindOpFlowTableCheckboxTrack();
      if (opFlowClearEl) {
        opFlowClearEl.addEventListener("click", () => {
          if (opFlowClearEl.disabled) return;
          if (!opFlowHasAggregateSteps()) return;
          openOpFlowClearModal();
        });
      }

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.source !== "business-modeling-prototype") return;
      });

      if (opFlowSaveEl) {
        opFlowSaveEl.addEventListener("click", () => {
          if (opFlowSaveEl.disabled) return;
          if (opFlowFromBusinessProcess) {
            saveExistingBusinessProcessFlow();
            return;
          }
          openSaveFlowModal();
        });
      }

      if (opFlowEditCancelEl) {
        opFlowEditCancelEl.addEventListener("click", () => {
          opFlowBusinessEditing = false;
          syncOpFlowSaveButton();
        });
      }

      if (navBackToListEl) {
        navBackToListEl.addEventListener("click", () => goToBusinessProcesses());
      }

      if (wsToolbarAllResourcesEl) {
        wsToolbarAllResourcesEl.addEventListener("click", () => openBpResourceOverviewAtModule());
      }

      if (wsToolbarNewFlowEl) {
        wsToolbarNewFlowEl.addEventListener("click", () => openBpNewFlowModal());
      }

      if (wsToolbarAllFlowsEl) {
        wsToolbarAllFlowsEl.addEventListener("click", () => goToBusinessProcesses());
      }

      if (wsToolbarExitEl) {
        wsToolbarExitEl.addEventListener("click", () => goToBusinessProcesses());
      }

      opFlowResourceAutoInclude = readOpFlowResourceAutoInclude();
      const wsResourceAutoIncludeEl = document.getElementById("wsResourceAutoInclude");
      if (wsResourceAutoIncludeEl) {
        wsResourceAutoIncludeEl.checked = opFlowResourceAutoInclude;
        wsResourceAutoIncludeEl.addEventListener("change", () => {
          writeOpFlowResourceAutoInclude(wsResourceAutoIncludeEl.checked);
          showToast(
            wsResourceAutoIncludeEl.checked
              ? "已开启：列表多选勾选的资源将记入流程"
              : "已关闭：列表多选勾选的资源不再记入流程",
            "info"
          );
        });
      }

      if (navSearchInputEl) {
        navSearchInputEl.addEventListener("input", () => {
          navSearchQuery = navSearchInputEl.value;
          renderNav();
        });
      }
      if (navSearchModuleScopeEl) navSearchModuleScopeEl.addEventListener("change", renderNav);
      if (navSearchResourceScopeEl) navSearchResourceScopeEl.addEventListener("change", renderNav);

      navPanelCollapsed = readNavPanelCollapsed();
      syncNavPanelCollapsed();
      if (navPanelCollapseBtnEl) {
        navPanelCollapseBtnEl.addEventListener("click", (e) => {
          e.stopPropagation();
          if (navPanelCollapsed) expandNavPanel({ focusSearch: true });
          else collapseNavPanel();
        });
      }
      if (navPanelCollapsedHintEl) {
        navPanelCollapsedHintEl.addEventListener("click", () => {
          expandNavPanel({ focusSearch: true });
        });
      }

      document.querySelectorAll(".sub-nav-item[data-hub-scene]").forEach((el) => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          goToScenePanorama();
        });
      });

      document.querySelectorAll(".sub-nav-item[data-hub-template]").forEach((el) => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          goToTemplateCenter();
        });
      });

      document.querySelectorAll(".sub-nav-item[data-hub-bp]").forEach((el) => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          goToBusinessProcesses();
        });
      });
    }

    function bootstrapApp() {
      try {
        bindAppEvents();
        goToScenePanorama({ skipAnimation: true });
      } catch (err) {
        console.error("bootstrapApp failed", err);
        centerOverride = "scene-panorama";
        syncMainLayout();
        syncHubSubNavActive("panorama");
        try {
          mountBusinessProcessListPage();
        } catch (innerErr) {
          console.error("mountBusinessProcessListPage fallback failed", innerErr);
        }
      }
    }

    bootstrapApp();
  </script>
</body>
</html>
