    function appendBpLineageGraphNodes(node, layer, hasParent, metrics, options) {
      layer.appendChild(buildBpLineageCardElement(node, hasParent, metrics, options));
      (node.children || []).forEach((child) =>
        appendBpLineageGraphNodes(child, layer, true, metrics, options)
      );
    }

    function buildBpLineageGraphElement(item, options) {
      const opts = options || {};
      const compact = !!opts.compact;
      const metrics = getBpLineageLayoutMetrics(compact);
      const graph = document.createElement("div");

      const resources = collectAllFlowResources(item);
      if (!resources.length) {
        return { graph: null, layout: null, nodeCount: 0, emptyText: "暂无资源血缘，请先在流程中产出资源" };
      }

      const tree = buildBpResourceLineageTree(resources);
      if (!tree) {
        return { graph: null, layout: null, nodeCount: 0, emptyText: "暂无资源血缘，请先在流程中产出资源" };
      }

      const layout = layoutBpResourceLineageTree(tree, metrics);
      graph.className =
        "bp-lineage-graph" +
        (compact ? " bp-lineage-graph--compact" : " bp-lineage-graph--detail");
      graph.style.width = layout.width + "px";
      graph.style.height = layout.height + "px";
      graph.style.minWidth = layout.width + "px";
      graph.style.minHeight = layout.height + "px";

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("class", "bp-lineage-graph__svg");
      svg.setAttribute("width", String(layout.width));
      svg.setAttribute("height", String(layout.height));
      svg.setAttribute("viewBox", "0 0 " + layout.width + " " + layout.height);

      collectBpLineageEdges(layout.root, null, metrics).forEach((edge) => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const mx = (edge.x1 + edge.x2) / 2;
        path.setAttribute(
          "d",
          "M " +
            edge.x1 +
            " " +
            edge.y1 +
            " C " +
            mx +
            " " +
            edge.y1 +
            ", " +
            mx +
            " " +
            edge.y2 +
            ", " +
            edge.x2 +
            " " +
            edge.y2
        );
        path.setAttribute("class", "bp-lineage-graph__edge");
        svg.appendChild(path);
      });

      const nodesLayer = document.createElement("div");
      nodesLayer.className = "bp-lineage-graph__nodes";
      nodesLayer.style.width = layout.width + "px";
      nodesLayer.style.height = layout.height + "px";
      appendBpLineageGraphNodes(layout.root, nodesLayer, false, metrics, { compact });

      graph.appendChild(svg);
      graph.appendChild(nodesLayer);
      return {
        graph,
        layout,
        nodeCount: countBpLineageNodes(layout.root),
        emptyText: null,
      };
    }

    function fitBpLineagePreviewScale(frame, scaleWrap, layout) {
      if (!frame || !scaleWrap || !layout) return;
      const fw = frame.clientWidth;
      const fh = frame.clientHeight;
      if (!fw || !fh) return;
      const scale = Math.min(fw / layout.width, fh / layout.height, 1);
      const offsetX = Math.max(0, (fw - layout.width * scale) / 2);
      const offsetY = Math.max(0, (fh - layout.height * scale) / 2);
      scaleWrap.style.width = layout.width + "px";
      scaleWrap.style.height = layout.height + "px";
      scaleWrap.style.transform =
        "translate(" + offsetX + "px, " + offsetY + "px) scale(" + scale + ")";
    }

    function scheduleBpLineagePreviewFit(diagram) {
      if (!diagram || typeof diagram._lineageFit !== "function") return;
      window.requestAnimationFrame(() => {
        diagram._lineageFit();
        window.requestAnimationFrame(() => diagram._lineageFit());
      });
    }

    function closeBpLineageDetailModal() {
      const backdrop = document.getElementById("bpLineageDetailBackdrop");
      if (backdrop) backdrop.hidden = true;
    }

    function getBpLineageDetailFitScale(state) {
      const layout = state.layout;
      const vw = Math.max(state.viewport.clientWidth - 48, 240);
      const vh = Math.max(state.viewport.clientHeight - 48, 180);
      return Math.min(vw / layout.width, vh / layout.height, 1);
    }

    function clampBpLineageDetailScale(scale) {
      return Math.min(3, Math.max(0.25, scale));
    }

    function applyBpLineageDetailScale(state, scale) {
      if (!state || !state.scaleWrap || !state.stage || !state.layout) return;
      const layout = state.layout;
      const nextScale = clampBpLineageDetailScale(scale);
      state.currentScale = nextScale;
      state.scaleWrap.style.width = layout.width + "px";
      state.scaleWrap.style.height = layout.height + "px";
      state.scaleWrap.style.transform = "scale(" + nextScale + ")";
      state.stage.style.width = Math.ceil(layout.width * nextScale) + "px";
      state.stage.style.height = Math.ceil(layout.height * nextScale) + "px";
      if (state.zoomLabel) state.zoomLabel.textContent = Math.round(nextScale * 100) + "%";
      if (state.zoomOutBtn) state.zoomOutBtn.disabled = nextScale <= 0.26;
      if (state.zoomInBtn) state.zoomInBtn.disabled = nextScale >= 2.99;
    }

    function mountBpLineageDetailView(bodyEl, graphResult) {
      const toolbar = document.createElement("div");
      toolbar.className = "bp-lineage-detail-toolbar";

      const toolbarLeft = document.createElement("div");
      toolbarLeft.className = "bp-lineage-detail-toolbar-left";
      const meta = document.createElement("span");
      meta.className = "bp-lineage-detail-meta";
      meta.textContent = "共 " + graphResult.nodeCount + " 个资源节点";
      toolbarLeft.appendChild(meta);

      const toolbarRight = document.createElement("div");
      toolbarRight.className = "bp-lineage-detail-toolbar-right";
      const zoomOutBtn = document.createElement("button");
      zoomOutBtn.type = "button";
      zoomOutBtn.className = "bp-lineage-detail-zoom-btn";
      zoomOutBtn.setAttribute("aria-label", "缩小");
      zoomOutBtn.title = "缩小";
      zoomOutBtn.textContent = "−";
      const zoomLabel = document.createElement("span");
      zoomLabel.className = "bp-lineage-detail-zoom-label";
      zoomLabel.textContent = "100%";
      const zoomInBtn = document.createElement("button");
      zoomInBtn.type = "button";
      zoomInBtn.className = "bp-lineage-detail-zoom-btn";
      zoomInBtn.setAttribute("aria-label", "放大");
      zoomInBtn.title = "放大";
      zoomInBtn.textContent = "+";
      toolbarRight.appendChild(zoomOutBtn);
      toolbarRight.appendChild(zoomLabel);
      toolbarRight.appendChild(zoomInBtn);

      toolbar.appendChild(toolbarLeft);
      toolbar.appendChild(toolbarRight);

      const viewport = document.createElement("div");
      viewport.className = "bp-lineage-detail-viewport";
      const stage = document.createElement("div");
      stage.className = "bp-lineage-detail-stage";
      const scaleWrap = document.createElement("div");
      scaleWrap.className = "bp-lineage-detail-scale";
      scaleWrap.appendChild(graphResult.graph);
      stage.appendChild(scaleWrap);
      viewport.appendChild(stage);

      bodyEl.appendChild(toolbar);
      bodyEl.appendChild(viewport);

      const state = {
        viewport,
        stage,
        scaleWrap,
        layout: graphResult.layout,
        zoomOutBtn,
        zoomInBtn,
        zoomLabel,
        baseFitScale: 1,
        currentScale: 1,
        userAdjusted: false,
      };
      bodyEl._lineageDetailState = state;

      const setUserScale = (scale) => {
        state.userAdjusted = true;
        applyBpLineageDetailScale(state, scale);
      };

      zoomInBtn.addEventListener("click", () => setUserScale(state.currentScale * 1.15));
      zoomOutBtn.addEventListener("click", () => setUserScale(state.currentScale / 1.15));

      viewport.addEventListener(
        "wheel",
        (e) => {
          if (!e.ctrlKey && !e.metaKey) return;
          e.preventDefault();
          setUserScale(state.currentScale * (e.deltaY > 0 ? 0.9 : 1.1));
        },
        { passive: false }
      );

      const initFit = () => {
        state.baseFitScale = getBpLineageDetailFitScale(state);
        if (!state.userAdjusted) applyBpLineageDetailScale(state, state.baseFitScale);
        else applyBpLineageDetailScale(state, state.currentScale);
      };

      window.requestAnimationFrame(initFit);
      window.requestAnimationFrame(initFit);
      if (window.ResizeObserver) {
        const ro = new ResizeObserver(initFit);
        ro.observe(viewport);
        state.resizeObserver = ro;
      }
      return state;
    }

    function openBpLineageDetailModal(item) {
      ensureBpLineageDetailModal();

      backdrop.hidden = false;
    }

    function groupBpRowsByCategory(rows) {
      const map = new Map();
      rows.forEach((item) => {
        const bd = resolveBpBoardDomain(item);
        const key = (bd.boardId || "_") + "::" + (bd.domain || "_");
        const label =
          (getBpBoardLabel(bd.boardId) || "未分类") + " · " + (bd.domain || "未指定业务域");
        if (!map.has(key)) map.set(key, { label, rows: [] });
        map.get(key).rows.push(item);
      });
      return [...map.values()].sort((a, b) => a.label.localeCompare(b.label, "zh-CN"));
    }

    function aggregateBpBoardSummaries(rows) {
      const byBoard = new Map();
      getBpCascadeData().forEach((board) => {
        byBoard.set(board.id, {
          boardId: board.id,
          boardLabel: board.label,
          catalogDomains: [...board.domains],
          activeDomains: new Set(),
          rows: [],
        });
      });
      const uncategorized = {
        boardId: "_uncategorized",
        boardLabel: "未分类",
        catalogDomains: [],
        activeDomains: new Set(),
        rows: [],
      };

      rows.forEach((item) => {
        const bd = resolveBpBoardDomain(item);
        let entry = byBoard.get(bd.boardId);
        if (!entry) {
          uncategorized.rows.push(item);
          if (bd.domain) uncategorized.activeDomains.add(bd.domain);
          return;
        }
        entry.rows.push(item);
        if (bd.domain) entry.activeDomains.add(bd.domain);
      });

      const summaries = [];
      byBoard.forEach((entry) => {
        const domains =
          entry.activeDomains.size > 0
            ? [...entry.activeDomains].sort((a, b) => a.localeCompare(b, "zh-CN"))
            : [...entry.catalogDomains];
        summaries.push({
          boardId: entry.boardId,
          boardLabel: entry.boardLabel,
          domains,
          hasFlows: entry.rows.length > 0,
          stats: aggregateBpListStats(entry.rows),
        });
      });
      if (uncategorized.rows.length) {
        summaries.push({
          boardId: uncategorized.boardId,
          boardLabel: uncategorized.boardLabel,
          domains: [...uncategorized.activeDomains].sort((a, b) => a.localeCompare(b, "zh-CN")),
          hasFlows: true,
          stats: aggregateBpListStats(uncategorized.rows),
        });
      }
      return summaries.sort((a, b) => {
        if (b.stats.flowCount !== a.stats.flowCount) return b.stats.flowCount - a.stats.flowCount;
        return a.boardLabel.localeCompare(b.boardLabel, "zh-CN");
      });
    }

    function buildPanoramaTrendSeries(flowCount) {
      const series = [];
      const base = Math.max(flowCount, 6);
      for (let i = 6; i >= 0; i -= 1) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const label =
          String(date.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(date.getDate()).padStart(2, "0");
        const wave = Math.round(base * 0.08 * Math.sin(i * 1.15 + base * 0.1));
        const spike = i === 3 ? Math.round(base * 0.35) : 0;
        series.push({ label, value: Math.max(0, base - i * 2 + wave + spike) });
      }
      return series;
    }

    function aggregatePanoramaMetrics(summaries, allRows) {
      const domainSet = new Set();
      summaries.forEach((summary) => {
        summary.domains.forEach((domain) => domainSet.add(domain));
      });

      let copyCount = 0;
      let projectSupport = 0;
      allRows.forEach((item) => {
        copyCount += getBpCopyCount(item);
        if (hasBpCollaborators(item) || getBpCopyCount(item) > 0) projectSupport += 1;
      });

      const domainMap = new Map();
      allRows.forEach((item) => {
        const domain = resolveBpBoardDomain(item).domain || "未指定业务域";
        domainMap.set(domain, (domainMap.get(domain) || 0) + 1);
      });

      const sceneFlowSeries = summaries
        .map((summary) => ({
          label: summary.boardLabel,
          value: summary.stats.flowCount,
          boardId: summary.boardId,
        }))
        .sort((a, b) => b.value - a.value);

      const domainFlowSeries = [...domainMap.entries()]
        .map(([label, value]) => ({ label, value }))
        .sort((a, b) => b.value - a.value);

      const sceneCopySeries = summaries
        .map((summary) => {
          const copy = allRows
            .filter((item) => resolveBpBoardDomain(item).boardId === summary.boardId)
            .reduce((acc, item) => acc + getBpCopyCount(item), 0);
          return { label: summary.boardLabel, value: copy, boardId: summary.boardId };
        })
        .sort((a, b) => b.value - a.value);

      const domainCopyMap = new Map();
      allRows.forEach((item) => {
        const domain = resolveBpBoardDomain(item).domain || "未指定业务域";
        const copies = getBpCopyCount(item);
        if (!copies) return;
        domainCopyMap.set(domain, (domainCopyMap.get(domain) || 0) + copies);
      });
      const domainCopySeries = [...domainCopyMap.entries()]
        .map(([label, value]) => ({ label, value }))
        .sort((a, b) => b.value - a.value);

      let templateCount = 0;
      let normalCount = 0;
      allRows.forEach((item) => {
        if (isBpTemplate(item)) templateCount += 1;
        else normalCount += 1;
      });

      return {
        sceneCount: summaries.length,
        domainCount: domainSet.size,
        flowCount: allRows.length,
        copyCount,
        projectSupport,
        templateCount,
        normalCount,
        resourceStats: aggregateBpListStats(allRows),
        trendSeries: buildPanoramaTrendSeries(allRows.length),
        sceneFlowSeries,
        domainFlowSeries,
        sceneCopySeries,
        domainCopySeries,
        yesterdayFlowDelta: Math.max(1, Math.round(allRows.length * 0.08)),
      };
    }

    function buildSpSmoothLinePath(points, tension) {
      const t = tension == null ? 0.45 : tension;
      if (!points.length) return "";
      if (points.length === 1) return "M " + points[0].x + " " + points[0].y;
      if (points.length === 2) {
        return (
          "M " +
          points[0].x +
          " " +
          points[0].y +
          " L " +
          points[1].x +
          " " +
          points[1].y
        );
      }
      let path = "M " + points[0].x + " " + points[0].y;
      for (let i = 0; i < points.length - 1; i += 1) {
        const p0 = points[i === 0 ? 0 : i - 1];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2 < points.length ? i + 2 : i + 1];
        const cp1x = p1.x + (p2.x - p0.x) * t;
        const cp1y = p1.y + (p2.y - p0.y) * t;
        const cp2x = p2.x - (p3.x - p1.x) * t;
        const cp2y = p2.y - (p3.y - p1.y) * t;
        path +=
          " C " +
          cp1x +
          " " +
          cp1y +
          ", " +
          cp2x +
          " " +
          cp2y +
          ", " +
          p2.x +
          " " +
          p2.y;
      }
      return path;
    }

    function createSpLineChartCard(title, series) {
      const card = document.createElement("div");
      card.className = "bp-sp-stat-card bp-sp-stat-card--line";
      const head = document.createElement("h4");
      head.className = "bp-sp-stat-card__title";
      head.textContent = title;
      card.appendChild(head);

      if (!series.length) {
        const empty = document.createElement("p");
        empty.className = "bp-sp-dashboard__chart-empty";
        empty.textContent = "暂无数据";
        card.appendChild(empty);
        return card;
      }

      const chartWrap = document.createElement("div");
      chartWrap.className = "bp-sp-line-chart";
      const w = 1000;
      const h = 220;
      const padX = 0;
      const padTop = 18;
      const padBottom = 0;
      const values = series.map((item) => item.value);
      const max = Math.max(...values, 1);
      const min = 0;
      const scaleMax = max * 1.18;
      const plotH = h - padTop - padBottom;
      const points = series.map((item, index) => {
        const x =
          padX + (index / Math.max(series.length - 1, 1)) * (w - padX * 2);
        const y =
          h -
          padBottom -
          ((item.value - min) / (scaleMax - min)) * plotH;
        return { x, y };
      });
      const linePath = buildSpSmoothLinePath(points, 0.35);
      const bottomY = h - padBottom;
      const areaPath =
        linePath +
        " L " +
        points[points.length - 1].x +
        " " +
        bottomY +
        " L " +
        points[0].x +
        " " +
        bottomY +
        " Z";

      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("viewBox", "0 0 " + w + " " + h);
      svg.setAttribute("preserveAspectRatio", "none");
      const defs = document.createElementNS(svgNS, "defs");
      const gradient = document.createElementNS(svgNS, "linearGradient");
      gradient.setAttribute("id", "spLineFill");
      gradient.setAttribute("x1", "0");
      gradient.setAttribute("y1", "0");
      gradient.setAttribute("x2", "0");
      gradient.setAttribute("y2", "1");
      const stop1 = document.createElementNS(svgNS, "stop");
      stop1.setAttribute("offset", "0%");
      stop1.setAttribute("stop-color", "#1677ff");
      stop1.setAttribute("stop-opacity", "0.35");
      const stop2 = document.createElementNS(svgNS, "stop");
      stop2.setAttribute("offset", "100%");
      stop2.setAttribute("stop-color", "#1677ff");
      stop2.setAttribute("stop-opacity", "0.02");
      gradient.appendChild(stop1);
      gradient.appendChild(stop2);
      defs.appendChild(gradient);
      svg.appendChild(defs);
      const area = document.createElementNS(svgNS, "path");
      area.setAttribute("d", areaPath);
      area.setAttribute("fill", "url(#spLineFill)");
      const line = document.createElementNS(svgNS, "path");
      line.setAttribute("d", linePath);
      line.setAttribute("fill", "none");
      line.setAttribute("stroke", "#1677ff");
      line.setAttribute("stroke-width", "2.5");
      line.setAttribute("stroke-linecap", "round");
      line.setAttribute("stroke-linejoin", "round");
      svg.appendChild(area);
      svg.appendChild(line);
      chartWrap.appendChild(svg);

      const labels = document.createElement("div");
      labels.className = "bp-sp-line-chart__labels";
      series.forEach((item) => {
        const lab = document.createElement("span");
        lab.className = "bp-sp-line-chart__label";
        lab.textContent = item.label;
        labels.appendChild(lab);
      });

      card.appendChild(chartWrap);
      card.appendChild(labels);
      return card;
    }

    function computePanoramaNotificationCounts(allRows) {
      let taskPending = 0;
      let exportOk = 0;
      let collab = 0;
      allRows.forEach((item) => {
        const copies = getBpCopyCount(item);
        if (hasBpCollaborators(item)) collab += 1;
        if (copies > 0) exportOk += copies;
        if (isBpTemplate(item) || /复制/.test(getBpDisplayTitle(item))) taskPending += 1;
      });
      return {
        task: Math.max(taskPending, allRows.length ? 2 : 0),
        export: Math.max(exportOk, allRows.length ? 3 : 0),
        collab: Math.max(collab, allRows.length ? 1 : 0),
      };
    }

    const bpCoopCtx = {
      item: null,
      selected: new Set(),
      tab: 0,
      page: 1,
      pageSize: 8,
      qMain: "",
      qTree: "",
      onSaved: null,
    };

    function closeBpCollaboratorModal() {
      const bd = document.getElementById("bpCoopBackdrop");
      if (bd) bd.hidden = true;
      bpCoopCtx.item = null;
      bpCoopCtx.onSaved = null;
      bpCoopCtx.selected.clear();
    }

    function renderBpCollaboratorModal() {
      const tabsEl = document.getElementById("bpCoopTabs");
      const bodyEl = document.getElementById("bpCoopBody");
      if (!tabsEl || !bodyEl) return;

      tabsEl.innerHTML = "";
      const nSel = bpCoopCtx.selected.size;
      ["协作者", "已选(" + nSel + ")"].forEach((label, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "bp-coop-tab" + (bpCoopCtx.tab === i ? " is-active" : "");
        b.textContent = label;
        b.addEventListener("click", () => {
          bpCoopCtx.tab = i;
          renderBpCollaboratorModal();
        });
        tabsEl.appendChild(b);
      });

      bodyEl.innerHTML = "";
      const p = document.createElement("div");
      p.className = "bp-coop-panel is-active";

      if (bpCoopCtx.tab === 0) {
        const split = document.createElement("div");
        split.className = "bp-coop-split";

        const tree = document.createElement("div");
        tree.className = "bp-coop-tree";
        const tw = document.createElement("div");
        tw.className = "bp-coop-tree-wrap";
        const ts = document.createElement("input");
        ts.type = "search";
        ts.className = "bp-coop-tree-search";
        ts.placeholder = "请搜索";
        ts.value = bpCoopCtx.qTree;
        ts.addEventListener("input", () => {
          bpCoopCtx.qTree = ts.value;
        });
        tw.appendChild(ts);
        tw.insertAdjacentHTML(
          "beforeend",
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>'
        );
        tree.appendChild(tw);
        const t1 = document.createElement("div");
        t1.className = "bp-coop-tree-node";
        t1.textContent = "▸ 一级目录";
        const t2 = document.createElement("div");
        t2.className = "bp-coop-tree-node bp-coop-tree-indent";
        t2.textContent = "▾ 二级目录";
        const t3 = document.createElement("div");
        t3.className = "bp-coop-tree-node bp-coop-tree-indent is-active";
        t3.textContent = "　三级目录";
        tree.appendChild(t1);
        tree.appendChild(t2);
        tree.appendChild(t3);

        const main = document.createElement("div");
        main.className = "bp-coop-main";
        const mw = document.createElement("div");
        mw.className = "bp-coop-search-wrap";
        const ms = document.createElement("input");
        ms.type = "search";
        ms.className = "bp-coop-main-search";
        ms.placeholder = "请搜索";
        ms.value = bpCoopCtx.qMain;
        ms.addEventListener("input", () => {
          bpCoopCtx.qMain = ms.value;
          bpCoopCtx.page = 1;
          renderBpCollaboratorModal();
        });
        mw.appendChild(ms);
        mw.insertAdjacentHTML(
          "beforeend",
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>'
        );
        main.appendChild(mw);

        const q = (bpCoopCtx.qMain || "").trim().toLowerCase();
        const filtered = BP_COOP_MOCK_USERS.filter(
          (u) => !q || u.name.toLowerCase().includes(q) || u.org.toLowerCase().includes(q)
        );
        const total = filtered.length;
        const totalPages = Math.max(1, Math.ceil(total / bpCoopCtx.pageSize));
        if (bpCoopCtx.page > totalPages) bpCoopCtx.page = totalPages;
        const start = (bpCoopCtx.page - 1) * bpCoopCtx.pageSize;
        const pageRows = filtered.slice(start, start + bpCoopCtx.pageSize);

        const wrap = document.createElement("div");
        wrap.className = "bp-coop-table-wrap";
        const table = document.createElement("table");
        table.className = "bp-coop-table";

        th0.style.width = "44px";

        master.type = "checkbox";
        const pageIds = new Set(pageRows.map((r) => r.id));
        const allPageSelected =
          pageRows.length > 0 && pageRows.every((r) => bpCoopCtx.selected.has(r.id));
        master.checked = allPageSelected;
        master.addEventListener("change", () => {
          if (master.checked) pageRows.forEach((r) => bpCoopCtx.selected.add(r.id));
          else pageRows.forEach((r) => bpCoopCtx.selected.delete(r.id));
          renderBpCollaboratorModal();

        trh.appendChild(th2);

        table.appendChild(thead);
        const tb = document.createElement("tbody");
        pageRows.forEach((u) => {

          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = bpCoopCtx.selected.has(u.id);

          tr.appendChild(td0);
          tr.appendChild(td1);
          tr.appendChild(td2);
          tb.appendChild(tr);
        });
        table.appendChild(tb);
        wrap.appendChild(table);
        main.appendChild(wrap);

        const pag = document.createElement("div");
        pag.className = "bp-coop-pag";
        pag.innerHTML = `<span>共${total}条</span>`;
        const pagBtns = document.createElement("div");
        pagBtns.className = "bp-coop-pag-btns";
        const prev = document.createElement("button");
        prev.type = "button";
        prev.className = "bp-coop-pag-btn";
        prev.textContent = "‹";
        prev.disabled = bpCoopCtx.page <= 1;
        prev.addEventListener("click", () => {
          if (bpCoopCtx.page > 1) {
            bpCoopCtx.page -= 1;
            renderBpCollaboratorModal();
          }
        });
        const next = document.createElement("button");
        next.type = "button";
        next.className = "bp-coop-pag-btn";
        next.textContent = "›";
        next.disabled = bpCoopCtx.page >= totalPages;
        next.addEventListener("click", () => {
          if (bpCoopCtx.page < totalPages) {
            bpCoopCtx.page += 1;
            renderBpCollaboratorModal();
          }
        });
        pagBtns.appendChild(prev);
        const maxNum = 5;
        let from = Math.max(1, bpCoopCtx.page - 2);
        let to = Math.min(totalPages, from + maxNum - 1);
        from = Math.max(1, to - maxNum + 1);
        for (let pg = from; pg <= to; pg += 1) {
          const pb = document.createElement("button");
          pb.type = "button";
          pb.className = "bp-coop-pag-btn" + (pg === bpCoopCtx.page ? " is-current" : "");

          pb.addEventListener("click", () => {

        if (to < totalPages) {

            });

            td1.textContent = u.name;
            const td2 = document.createElement("td");

    function buildCustomTemplateCard(template) {
      const card = document.createElement("section");
      card.className = "ft-card ft-card--clickable ft-card--custom";
      card.setAttribute("role", "button");
      card.tabIndex = 0;

      const modules = template.modules || [];
      const preview = modules.slice(0, 4);
      const flowParts = preview.map((m, i) => {
        const arr = i > 0 ? '<span class="ft-flow-arr">→</span>' : "";
        const label = String(m.label || "").replace(/</g, "&lt;");
        return (
          arr +
          '<div class="ft-slab ft-slab--muted"><span class="ft-slab-ico" aria-hidden="true">⚙</span>' +
          label +
          "</div>"
        );
      });
      if (modules.length > 4) {
        flowParts.push('<span class="ft-flow-arr">→</span><div class="ft-slab ft-slab--muted">…</div>');
      }

      const desc =
        template.description && String(template.description).trim()
          ? String(template.description).trim()
          : "自定义组装的 " + modules.length + " 步操作模板。";
      const bulletItems = modules.slice(0, 3).map((m) => {
        const label = String(m.label || "").replace(/</g, "&lt;");
        return "<li><strong>" + label + "</strong>：" + (m.path || "操作模块") + "</li>";
      });
      if (modules.length > 3) {
        bulletItems.push("<li>共 " + modules.length + " 个操作步骤，可按需跳跃与多次实例化。</li>");
      }

      card.innerHTML =
        "<h2 class=\"ft-card-title\">" +
        String(template.name || "自定义业务场景").replace(/</g, "&lt;") +
        "</h2>" +
        '<p class="ft-card-sub">' +
        desc.replace(/</g, "&lt;") +
        "</p>" +
        '<div class="ft-sketch"><div class="ft-sketch-cap">自定义业务场景 · ' +
        modules.length +
        " 步流程</div>" +
        '<div class="ft-flow ft-flow--compact">' +
        (flowParts.join("") || '<div class="ft-slab">暂无步骤</div>') +
        "</div></div>" +
        '<ul class="ft-bullets">' +
        bulletItems.join("") +
        "</ul>";

      function activate() {
        startNewFlowFromCustomTemplate(template);
      }
      card.addEventListener("click", activate);
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          activate();
        }
      });
      return card;
    }

    function buildPresetModuleStackMarkup(groups, cardClassPrefix) {
      const p = cardClassPrefix || "ft";
      return (groups || [])
        .map((g) => {
          const ops = (g.operations || [])
            .map((op) => '<div class="' + p + '-module-op">' + String(op.label).replace(/</g, "&lt;") + "</div>")
            .join("");
          return (
            '<div class="' +
            p +
            '-module-card"><div class="' +
            p +
            '-module-card-title">' +
            String(g.title).replace(/</g, "&lt;") +
            '</div><div class="' +
            p +
            '-module-card-body">' +
            ops +
            "</div></div>"
          );
        })
        .join("");
    }

    const TC_TEMPLATE_VISIBLE_MAX = 6;
    const TC_TEMPLATE_FLOAT_ANIM_MS = 360;
    let tcTemplateFloatLayerEl = null;
    let tcTemplateFloatEscHandler = null;
    let tcTemplateFloatCloseTimer = null;
    let tcTemplateFloatBodyOverflow = "";

    function lockTcTemplateFloatBodyScroll() {
      if (tcTemplateFloatBodyOverflow !== "") return;
      tcTemplateFloatBodyOverflow = document.body.style.overflow || "";
      document.body.style.overflow = "hidden";
    }

    function unlockTcTemplateFloatBodyScroll() {
      if (tcTemplateFloatBodyOverflow === "") return;
      document.body.style.overflow = tcTemplateFloatBodyOverflow;
      tcTemplateFloatBodyOverflow = "";
    }

    function closeTcTemplateGridOverlay(immediate) {
      if (tcTemplateFloatEscHandler) {
        document.removeEventListener("keydown", tcTemplateFloatEscHandler);
        tcTemplateFloatEscHandler = null;
      }
      if (!tcTemplateFloatLayerEl) return;
      const layer = tcTemplateFloatLayerEl;
      if (immediate) {
        if (tcTemplateFloatCloseTimer) {
          clearTimeout(tcTemplateFloatCloseTimer);
          tcTemplateFloatCloseTimer = null;
        }
        layer.remove();
        tcTemplateFloatLayerEl = null;
        unlockTcTemplateFloatBodyScroll();
        return;
      }
      if (layer.classList.contains("is-closing")) return;
      layer.classList.remove("is-open");
      layer.classList.add("is-closing");
      if (tcTemplateFloatCloseTimer) clearTimeout(tcTemplateFloatCloseTimer);
      tcTemplateFloatCloseTimer = window.setTimeout(() => {
        if (tcTemplateFloatLayerEl) tcTemplateFloatLayerEl.remove();
        tcTemplateFloatLayerEl = null;
        tcTemplateFloatCloseTimer = null;
        unlockTcTemplateFloatBodyScroll();
      }, TC_TEMPLATE_FLOAT_ANIM_MS);
    }

    function clearTemplateGridShellExtras(shellEl) {
      if (!shellEl) return;
      shellEl.querySelectorAll(".tc-template-more-guide, .tc-template-grid-foot").forEach((el) => el.remove());
      const host = shellEl.parentElement;
      if (host) {
        host.querySelectorAll(":scope > .tc-template-grid-foot").forEach((el) => el.remove());
        host.classList.remove("bp-filter-panel__body--has-expand");
      }
      shellEl.classList.remove("is-expanded");
    }

    function resolveTemplateGridExpandHost(shellEl) {
      if (!shellEl) return shellEl;
      const parent = shellEl.parentElement;
      if (parent && parent.classList.contains("bp-filter-panel__body")) return parent;
      return shellEl;
    }

    function appendTemplateGridExpandBar(shellEl, onExpand) {
      if (!shellEl || typeof onExpand !== "function") return;
      const host = resolveTemplateGridExpandHost(shellEl);
      if (host.classList.contains("bp-filter-panel__body")) {
        host.classList.add("bp-filter-panel__body--has-expand");
      }
      const foot = document.createElement("div");
      foot.className = "tc-template-grid-foot tc-template-grid-foot--expand";
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "tc-template-grid-expand-btn";
      btn.setAttribute("aria-label", "展开全部场景模板");
      btn.innerHTML =
        '<span class="tc-template-grid-expand-btn__text">展开</span>' +
        '<span class="tc-template-grid-expand-btn__arrow" aria-hidden="true">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M6 9l6 6 6-6"/>' +
        "</svg></span>";
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        onExpand();
      });
      foot.appendChild(btn);
      host.appendChild(foot);
    }

    function appendTemplateGridActionBar(shellEl, label, ariaLabel, onClick) {
      if (!shellEl || typeof onClick !== "function") return;
      const foot = document.createElement("div");
      foot.className = "tc-template-grid-foot";
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "tc-template-grid-action-btn";
      btn.textContent = label;
      btn.setAttribute("aria-label", ariaLabel || label);
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        onClick();
      });
      foot.appendChild(btn);
      shellEl.appendChild(foot);
    }

    function resolveOverflowGridClass(gridEl, opts) {
      if (opts && opts.gridClass) return opts.gridClass;
      if (gridEl && gridEl.classList.contains("bp-scene-filter-cards")) {
        return "bp-scene-filter-cards--row6";
      }
      if (gridElUsesFtClass(gridEl)) return "ft-grid--template-row6";
      return "tc-grid--template-row6";
    }

    function mountOverflowTemplateGrid(config) {
      const opts = config || {};
      const shellEl = opts.shellEl;
      const gridEl = opts.gridEl;
      const items = opts.items || [];
      const buildCard = opts.buildCard;
      const emptyText = opts.emptyText;
      const gridClass = resolveOverflowGridClass(gridEl, opts);

      if (!shellEl || !gridEl || typeof buildCard !== "function") return;

      const hasMore = items.length > TC_TEMPLATE_VISIBLE_MAX;

      function mountGrid(expanded) {
        closeTcTemplateGridOverlay(true);
        clearTemplateGridShellExtras(shellEl);
        gridEl.innerHTML = "";
        gridEl.classList.remove("bp-scene-filter-cards--row6", "bp-scene-filter-cards--fit");

        if (!items.length) {
          if (emptyText) {
            const empty = document.createElement("div");
            empty.className = "tc-empty";
            empty.textContent = emptyText;
            gridEl.appendChild(empty);
          }
          shellEl.dataset.tcTemplateExpanded = "0";
          return;
        }

        if (expanded) {
          shellEl.classList.add("is-expanded");
          shellEl.dataset.tcTemplateExpanded = "1";
          gridEl.classList.add(gridClass);
          gridEl.style.removeProperty("--scene-card-fit-cols");
          items.forEach((item, index) => gridEl.appendChild(buildCard(item, index)));
          appendTemplateGridActionBar(shellEl, "收起", "收起场景模板", () => mountGrid(false));
          return;
        }

        shellEl.dataset.tcTemplateExpanded = "0";
        if (
          gridEl.classList.contains("bp-scene-filter-cards") &&
          items.length > 0 &&
          items.length <= TC_TEMPLATE_VISIBLE_MAX
        ) {
          gridEl.classList.add("bp-scene-filter-cards--fit");
          gridEl.style.setProperty("--scene-card-fit-cols", String(items.length));
        } else {
          gridEl.classList.add(gridClass);
          gridEl.style.removeProperty("--scene-card-fit-cols");
        }

        const visibleItems = hasMore ? items.slice(0, TC_TEMPLATE_VISIBLE_MAX) : items;
        visibleItems.forEach((item, index) => {
          gridEl.appendChild(buildCard(item, index));
        });
        if (hasMore) {
          appendTemplateGridExpandBar(shellEl, () => mountGrid(true));
        }
      }

      const initiallyExpanded = hasMore && shellEl.dataset.tcTemplateExpanded === "1";
      mountGrid(initiallyExpanded);
    }

    function openTcTemplateGridOverlay(config) {
      const opts = config || {};
      const anchorEl = opts.anchorEl;
      const items = opts.items || [];
      const buildCard = opts.buildCard;
      const title = opts.title || "全部场景模板";
      const variant =
        opts.variant ||
        (anchorEl && anchorEl.querySelector(".bp-scene-filter-cards") ? "scene" : "default");
      const gridClass =
        opts.gridClass ||
        resolveOverflowGridClass(
          anchorEl && anchorEl.classList.contains("bp-scene-filter-cards")
            ? anchorEl
            : anchorEl && anchorEl.querySelector(".bp-scene-filter-cards"),
          opts
        );
      if (!anchorEl || !items.length || typeof buildCard !== "function") return;

      closeTcTemplateGridOverlay(true);

      const rect = anchorEl.getBoundingClientRect();
      const layer = document.createElement("div");
      layer.className =
        "tc-template-float-layer tc-template-float-layer--" +
        variant;
      layer.setAttribute("role", "dialog");
      layer.setAttribute("aria-modal", "true");
      layer.setAttribute("aria-label", title);

      const backdrop = document.createElement("button");
      backdrop.type = "button";
      backdrop.className = "tc-template-float-layer__backdrop";
      backdrop.setAttribute("aria-label", "关闭模板浮层");

      const panel = document.createElement("div");
      panel.className = "tc-template-float-layer__panel";
      panel.style.top = Math.max(8, rect.top) + "px";
      panel.style.left = Math.max(8, rect.left) + "px";
      panel.style.width = Math.min(rect.width, window.innerWidth - 16) + "px";

      function bindClose(closeLayer) {
        backdrop.addEventListener("click", closeLayer);
        tcTemplateFloatEscHandler = (e) => {
          if (e.key === "Escape") closeLayer();
        };
        document.addEventListener("keydown", tcTemplateFloatEscHandler);
      }

      if (variant === "scene") {
        const hubWrap = document.createElement("div");
        hubWrap.className = "bp-hub--v3 tc-template-float-layer__hub";

        const body = document.createElement("div");
        body.className = "tc-template-float-layer__body";
        const fullGrid = document.createElement("div");
        fullGrid.className =
          "bp-scene-filter-cards bp-scene-filter-cards--row6 tc-template-float-layer__grid";
        fullGrid.setAttribute("role", "list");
        fullGrid.setAttribute("aria-label", "全部场景模板");
        items.forEach((item, index) => fullGrid.appendChild(buildCard(item, index)));
        body.appendChild(fullGrid);

        const foot = document.createElement("div");
        foot.className = "tc-template-float-layer__foot";
        const collapseBtn = document.createElement("button");
        collapseBtn.type = "button";
        collapseBtn.className = "tc-template-float-layer__collapse-btn";
        collapseBtn.textContent = "收起";
        collapseBtn.setAttribute("aria-label", "收起场景模板面板");
        foot.appendChild(collapseBtn);

        hubWrap.appendChild(body);
        hubWrap.appendChild(foot);
        panel.appendChild(hubWrap);

        function closeLayer() {
          closeTcTemplateGridOverlay(false);
        }
        collapseBtn.addEventListener("click", closeLayer);
        bindClose(closeLayer);
      } else {
        const head = document.createElement("div");
        head.className = "tc-template-float-layer__head";
        const headTitle = document.createElement("h3");
        headTitle.className = "tc-template-float-layer__title";
        headTitle.id = "tcTemplateFloatTitle";
        headTitle.textContent = title + "（共 " + items.length + " 个）";
        const closeBtn = document.createElement("button");
        closeBtn.type = "button";
        closeBtn.className = "tc-template-float-layer__close";
        closeBtn.setAttribute("aria-label", "关闭");
        closeBtn.textContent = "×";
        head.appendChild(headTitle);
        head.appendChild(closeBtn);

        const body = document.createElement("div");
        body.className = "tc-template-float-layer__body";
        const fullGrid = document.createElement("div");
        const baseGridClass = anchorEl.classList.contains("bp-scene-filter-cards")
          ? "bp-scene-filter-cards"
          : gridElUsesFtClass(anchorEl)
            ? "ft-grid"
            : "tc-grid";
        fullGrid.className = baseGridClass + " " + gridClass + " tc-template-float-layer__grid";

      function isOpInLeafGroup(op) {
        return selectedModules.some((m) => m.id === op.id && m.leafId === op.leafId);
      }

      function groupSelectedModules() {
        const groups = [];
        const groupIndexByLeaf = new Map();
        selectedModules.forEach((mod, index) => {
          const existingIdx = groupIndexByLeaf.get(mod.leafId);
          if (existingIdx !== undefined) {
            groups[existingIdx].items.push({ mod, index });
            return;
          }
          groupIndexByLeaf.set(mod.leafId, groups.length);
          groups.push({
            leafId: mod.leafId,
            title: getTemplateModuleGroupTitle(mod),
            items: [{ mod, index }],
          });
        });
        return groups;
      }

      function flattenGroupsToModules(groups) {
        return groups.flatMap((g) => g.items.map((item) => item.mod));
      }

      function moveGroup(groupIndex, delta) {
        const groups = groupSelectedModules();
        const target = groupIndex + delta;
        if (target < 0 || target >= groups.length) return;
        const tmp = groups[groupIndex];
        groups[groupIndex] = groups[target];
        groups[target] = tmp;
        selectedModules.length = 0;
        selectedModules.push(...flattenGroupsToModules(groups));
        renderSelectedList();
        renderCatalog();
      }

      function removeGroup(groupIndex) {
        const groups = groupSelectedModules();
        groups.splice(groupIndex, 1);
        selectedModules.length = 0;
        selectedModules.push(...flattenGroupsToModules(groups));
        renderSelectedList();
        renderCatalog();
      }

      function buildFlowGroupActions(groupIndex, totalGroups) {
        const actions = document.createElement("div");
        actions.className = "otb-flow-section-actions";
        const upBtn = document.createElement("button");
        upBtn.type = "button";
        upBtn.className = "otb-icon-btn";
        upBtn.textContent = "↑";
        upBtn.title = "大模块上移";
        upBtn.disabled = groupIndex === 0;
        upBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          moveGroup(groupIndex, -1);
        });
        const downBtn = document.createElement("button");
        downBtn.type = "button";
        downBtn.className = "otb-icon-btn";
        downBtn.textContent = "↓";
        downBtn.title = "大模块下移";
        downBtn.disabled = groupIndex === totalGroups - 1;
        downBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          moveGroup(groupIndex, 1);
        });
        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "otb-icon-btn";
        removeBtn.textContent = "×";
        removeBtn.title = "删除整个大模块";
        removeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          removeGroup(groupIndex);
        });
        actions.appendChild(upBtn);
        actions.appendChild(downBtn);
        actions.appendChild(removeBtn);
        return actions;
      }

      function buildFlowNodeActions(index) {
        const actions = document.createElement("div");
        actions.className = "otb-flow-node-actions";
        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "otb-icon-btn";
        removeBtn.textContent = "×";
        removeBtn.title = "删除该操作";
        removeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          selectedModules.splice(index, 1);
          renderSelectedList();
          renderCatalog();
        });
        actions.appendChild(removeBtn);
        return actions;
      }

      function renderSelectedList() {

        groups.forEach((group, groupIndex) => {

      function resolveCatalogSectionTitle(g) {
        if (g.l2 === "数据分析") return "制作报告";
        return g.l2;
      }

      function buildCatalogOpPath(l1, g, op) {
        return [l1.l1, g.l2, op.label].filter(Boolean).join(" / ");
      }

      function addOpModule(op, path, sectionTitle) {
        if (isOpInLeafGroup(op)) {
          const groupLabel = getTemplateModuleGroupTitle({ leafId: op.leafId, path: path, sectionTitle: sectionTitle });
          showToast("「" + op.label + "」已在「" + groupLabel + "」中添加，不可重复添加", "info");
          return;
        }
        selectedModules.push({
          id: op.id,
          label: op.label,
          leafId: op.leafId,
          path: path,
          sectionTitle: sectionTitle || getModuleSectionTitle({ leafId: op.leafId }),
        });
        renderSelectedList();
        renderCatalog();
      }

      function renderCatalog() {
        catalogBody.innerHTML = "";
        const q = catalogFilter.trim().toLowerCase();
        let hasAny = false;

        OP_TEMPLATE_MODULE_CATALOG.forEach((l1) => {
          const l1Block = document.createElement("div");
          l1Block.className = "otb-l1";
          let l1Has = false;

          l1.groups.forEach((g) => {
            const ops = g.operations.filter((op) => {
              if (!q) return true;
              const path = buildCatalogOpPath(l1, g, op);
              return (
                op.label.toLowerCase().includes(q) ||
                path.toLowerCase().includes(q) ||
                l1.l1.toLowerCase().includes(q) ||
                g.l2.toLowerCase().includes(q)
              );
            });
            if (!ops.length) return;

            l1Has = true;
            hasAny = true;
            const l2Block = document.createElement("div");
            l2Block.className = "otb-l2-block";
            const l2Title = document.createElement("div");
            l2Title.className = "otb-l2-title";
            l2Title.textContent = g.l2;
            l2Block.appendChild(l2Title);
            const opList = document.createElement("div");
            opList.className = "otb-op-list";
            ops.forEach((op) => {
              const path = buildCatalogOpPath(l1, g, op);
              const chip = document.createElement("button");
              chip.type = "button";
              const added = isOpInLeafGroup(op);
              chip.className = "otb-op-chip" + (added ? " is-selected" : "");
              chip.textContent = op.label;
              chip.title = added ? path + "（该分组下已添加）" : path;
              chip.disabled = added;
              if (!added) {
                chip.addEventListener("click", () =>
                  addOpModule(op, path, resolveCatalogSectionTitle(g))
                );
              }
              opList.appendChild(chip);
            });
            l2Block.appendChild(opList);
            l1Block.appendChild(l2Block);
          });

          if (!l1Has) return;
          const l1Title = document.createElement("div");
          l1Title.className = "otb-l1-title";
          l1Title.textContent = l1.l1;
          l1Block.insertBefore(l1Title, l1Block.firstChild);
          catalogBody.appendChild(l1Block);
        });

        if (!hasAny) {
          const empty = document.createElement("div");
          empty.className = "otb-selected-empty";
          empty.textContent = q ? "未找到匹配的操作模块" : "暂无可用操作模块";
          catalogBody.appendChild(empty);
        }
      }

      catalogSearch.addEventListener("input", () => {
        catalogFilter = catalogSearch.value;
        renderCatalog();
      });

      cancelBtn.addEventListener("click", () => goToTemplateCenter());

      saveBtn.addEventListener("click", () => {
        const name = nameInput.value.trim();

          name: name,
          description: description,
          published: publishInput.checked,
          modules: selectedModules.map((m) => ({
            id: m.id,

            leafId: m.leafId,
            path: m.path,
            sectionTitle: getModuleSectionTitle(m),
          })),
          creator: editing ? editing.creator || getCurrentTemplateUser() : getCurrentTemplateUser(),
          createdAt: editing ? editing.createdAt || now : now,
          updatedAt: now,
        };
        saveCustomTemplate(template);
        showToast(
          template.published

            : "场景已保存（未上线），可在场景定义继续编辑或上线",
          "success"
        );
        goToTemplateCenter();
      });

      renderCatalog();
      renderSelectedList();
    }

      function syncHubDrilldownView() {
        root.classList.toggle("is-board-drilldown", isFlowListMode);

      function exitBulkPick() {
        bulkPickMode = false;
        pendingDeleteAll = false;
        selectedBulkIds.clear();
      }

      function syncBulkToolbarExtras() {
        bulkCancelInline.hidden = !(bulkPickMode && !pendingDeleteAll && selectedBulkIds.size === 0);
      }

      function updateBulkBar() {
        bulkBar.innerHTML = "";
        bulkBar.className = "bp-bulk-bar";
        const showBulkBar = bulkPickMode || pendingDeleteAll;
        bulkBar.hidden = !showBulkBar;
        syncBulkToolbarExtras();
        if (!showBulkBar) return;

        const left = document.createElement("div");
        left.className = "bp-bulk-bar-left";
        const act = document.createElement("div");
        act.className = "bp-bulk-actions";

        const useYellow =
          pendingDeleteAll || (bulkPickMode && selectedBulkIds.size > 0);
        if (useYellow) {
          bulkBar.classList.add("bp-bulk-bar--yellow");
        }

        if (bulkPickMode && selectedBulkIds.size > 0) {
          left.textContent = `已选择 ${selectedBulkIds.size} 条`;
          const ok = document.createElement("button");
          ok.type = "button";
          ok.className = "bp-bulk-btn bp-bulk-btn-primary";
          ok.textContent = "确认";
          ok.addEventListener("click", () => {
            selectedBulkIds.forEach((id) => removeBpItem(id));
            exitBulkPick();
            renderCards();
            showToast("已删除所选流程", "success");
          });
          const cancel = document.createElement("button");
          cancel.type = "button";
          cancel.className = "bp-bulk-btn";
          cancel.textContent = "取消";
          cancel.addEventListener("click", () => {
            exitBulkPick();
            renderCards();
          });
          act.appendChild(ok);
          act.appendChild(cancel);
        } else if (pendingDeleteAll) {
          const visible = getMergedRows().filter(matchesFilters);
          const n = visible.length;
          left.textContent = `将删除当前筛选/分类下的共 ${n} 条流程，此操作不可恢复`;
          const ok = document.createElement("button");
          ok.type = "button";
          ok.className = "bp-bulk-btn bp-bulk-btn-primary";
          ok.textContent = "确认";
          ok.addEventListener("click", () => {
            const ids = getMergedRows().filter(matchesFilters).map((x) => x.id);
            if (ids.length === 0) {
              showToast("当前条件下暂无可删除的流程", "warn");
              exitBulkPick();
              renderCards();
              return;
            }
            ids.forEach((id) => removeBpItem(id));
            exitBulkPick();
            renderCards();
            showToast("已删除当前列表中的流程", "success");
          });
          const cancel = document.createElement("button");
          cancel.type = "button";
          cancel.className = "bp-bulk-btn";
          cancel.textContent = "取消";
          cancel.addEventListener("click", () => {
            exitBulkPick();
            renderCards();
          });
          act.appendChild(ok);
          act.appendChild(cancel);
        } else if (bulkPickMode) {
          left.textContent =
            "请勾选卡片左侧要删除的流程，勾选后点击「确认」批量删除；无需删除请点击「取消」。";
          const cancel = document.createElement("button");
          cancel.type = "button";
          cancel.className = "bp-bulk-btn";
          cancel.textContent = "取消";
          cancel.addEventListener("click", () => {
            exitBulkPick();
            renderCards();
          });
          act.appendChild(cancel);
        }

        bulkBar.appendChild(left);
        bulkBar.appendChild(act);
      }

      bulkOptPick.addEventListener("click", (e) => {
        e.stopPropagation();
        bulkDdMenu.hidden = true;
        pendingDeleteAll = false;
        bulkPickMode = true;
        selectedBulkIds.clear();
        renderCards();
      });
      bulkOptAll.addEventListener("click", (e) => {
        e.stopPropagation();
        bulkDdMenu.hidden = true;
        bulkPickMode = false;
        selectedBulkIds.clear();
        pendingDeleteAll = true;
        renderCards();
      });

      function syncFilterDomainsAfterBoardChange() {
        if (!filterBoardIds.length) {
          filterDomains = [];
          return;
        }
        const available = getDomainsForBpBoards(filterBoardIds);
        filterDomains = filterDomains.filter((d) => available.includes(d));
      }

      function renderSceneFilterCards() {
        const sceneCardIconKeys = ["flow", "tasks", "reports", "apis", "models", "boards"];
        const sceneCardBlueTone = {
          bg: "#f8fbff",
          iconBg: "#e6f4ff",
          iconColor: "#2563eb",
        };

        function buildSceneFilterCard(board, index) {
          const tone = {
            ...sceneCardBlueTone,
            iconKey: sceneCardIconKeys[index % sceneCardIconKeys.length],
          };
          const card = document.createElement("article");
          card.className =
            "bp-scene-filter-card" + (filterBoardIds.includes(board.id) ? " is-active" : "");
          card.dataset.boardId = board.id;
          card.setAttribute("role", "listitem");
          card.style.setProperty("--scene-card-bg", tone.bg);
          card.style.setProperty("--scene-card-icon-bg", tone.iconBg);
          card.style.setProperty("--scene-card-icon-color", tone.iconColor);

          const head = document.createElement("button");
          head.type = "button";
          head.className = "bp-scene-filter-card__head";
          head.setAttribute("aria-label", "选择场景 " + board.label);
          const icon = document.createElement("div");
          icon.className = "bp-scene-filter-card__icon";
          icon.setAttribute("aria-hidden", "true");
          icon.innerHTML = getBpStatTabIconSvg(tone.iconKey);
          const title = document.createElement("h3");
          title.className = "bp-scene-filter-card__title";
          title.textContent = board.label;
          head.appendChild(icon);
          head.appendChild(title);
          head.addEventListener("click", (e) => {
            e.stopPropagation();
            closeTcTemplateGridOverlay();
            toggleBoardFilter(board.id);
          });

          const domainsWrap = document.createElement("div");
          domainsWrap.className = "bp-scene-filter-card__domains";
          board.domains.forEach((domain) => {
            const tag = document.createElement("button");
            tag.type = "button";
            tag.className =
              "bp-scene-filter-card__domain" + (filterDomains.includes(domain) ? " is-on" : "");
            tag.textContent = domain;
            tag.dataset.domain = domain;
            tag.setAttribute("aria-label", "筛选业务域 " + domain);
            tag.addEventListener("click", (e) => {
              e.stopPropagation();
              closeTcTemplateGridOverlay();
              toggleDomainFilter(domain);
            });
            domainsWrap.appendChild(tag);
          });

          card.appendChild(head);
          card.appendChild(domainsWrap);
          return card;
        }

        const boards = getBpCascadeData();
        mountOverflowTemplateGrid({
          shellEl: sceneTemplateShell,
          gridEl: sceneCardsEl,
          items: boards,
          buildCard: buildSceneFilterCard,
          gridClass: "bp-scene-filter-cards--row6",
          overlayVariant: "scene",
          overlayTitle: "全部场景模板",
          emptyText: boards.length ? null : "暂无场景模板",
        });
      }

      function toggleBoardFilter(boardId) {
        if (!boardId) {
          filterBoardIds = [];
          filterDomains = [];
        } else {
          const index = filterBoardIds.indexOf(boardId);
          if (index >= 0) filterBoardIds.splice(index, 1);
          else filterBoardIds.push(boardId);
          syncFilterDomainsAfterBoardChange();
        }
        renderAllFilters();
        renderCards();
      }

      function toggleDomainFilter(domain) {
        if (!domain) {
          filterDomains = [];
        } else {
          const index = filterDomains.indexOf(domain);
          if (index >= 0) filterDomains.splice(index, 1);
          else filterDomains.push(domain);
        }
        renderAllFilters();
        renderCards();
      }

      function matchesFilters(item) {
        const bd = resolveBpBoardDomain(item);
        if (filterBoardIds.length && !filterBoardIds.includes(bd.boardId)) return false;
        if (filterDomains.length && !filterDomains.includes(bd.domain)) return false;
        if (activeFilt === "收藏" && !isBpFavorite(item)) return false;
        if (activeFilt === "模板" && !isBpTemplate(item)) return false;
        if (activeFilt === "协作主题") {
          if (!item.collaborators || item.collaborators === "—") return false;
        }
        const q = (search.value || "").trim().toLowerCase();
        if (q && !String(getBpDisplayTitle(item)).toLowerCase().includes(q)) return false;
        if (
          bpListSourceTemplateFilter &&
          !getBpDisplayTitle(item).includes(bpListSourceTemplateFilter)
        ) {
          return false;
        }
        return true;
      }

      function updateSourceTemplateBanner() {
        if (!bpListSourceTemplateFilter) {
          sourceTplBanner.hidden = true;
          sourceTplBanner.innerHTML = "";
          return;
        }
        const name = getBpSourceTemplateNameFromSuffix(bpListSourceTemplateFilter);
        sourceTplBanner.hidden = false;
        sourceTplBanner.innerHTML = "";
        const row = document.createElement("div");
        row.className = "bp-source-template-banner-inner";
        const txt = document.createElement("span");
        txt.className = "bp-source-template-banner-text";
        txt.textContent = "当前已选择来源「" + name + "」模板的所有业务。";
        const del = document.createElement("button");
        del.type = "button";
        del.className = "bp-source-template-banner-clear";
        del.textContent = "删除条件";
        del.addEventListener("click", (e) => {
          e.stopPropagation();
          bpListSourceTemplateFilter = null;
          updateSourceTemplateBanner();
          renderCards();
        });
        row.appendChild(txt);
        row.appendChild(del);
        sourceTplBanner.appendChild(row);
      }

      function renderAllFilters() {
        renderSceneFilterCards();
        filtChips.innerHTML = "";
        filters.forEach((lab) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "bp-chip" + (lab === activeFilt ? " is-on" : "");
          b.textContent = lab;
          b.addEventListener("click", () => {
            activeFilt = lab;
            renderAllFilters();
            renderCards();
          });
          filtChips.appendChild(b);
        });
      }

      function renderProcessList(rows) {
        const cardCtx = {
          bulkPickMode,
          pendingDeleteAll,
          selectedBulkIds,
          onRefresh: renderCards,
          onBulkChange: updateBulkBar,
          onSourceTemplateFilter: () => {
            updateSourceTemplateBanner();
            renderCards();
          },
        };
        const groups = groupBpRowsByCategory(rows);
        groups.forEach((group) => {
          if (group.label) {
            const groupKey = group.label;
            const collapsed = collapsedBpGroups.has(groupKey);
            const section = document.createElement("section");
            section.className = "bp-group" + (collapsed ? " is-collapsed" : "");
            const gh = document.createElement("div");
            gh.className = "bp-group-head";
            const toggle = document.createElement("button");
            toggle.type = "button";
            toggle.className = "bp-group-toggle";
            toggle.setAttribute("aria-expanded", String(!collapsed));
            const gt = document.createElement("h3");
            gt.className = "bp-group-title";
            gt.textContent = group.label;
            const gc = document.createElement("span");
            gc.className = "bp-group-count";
            const gcText = document.createElement("span");
            gcText.textContent = "共 " + group.rows.length + " 个流程";
            const caret = document.createElement("span");
            caret.className = "bp-group-caret";
            caret.setAttribute("aria-hidden", "true");
            caret.textContent = "▾";
            gc.appendChild(gcText);
            gc.appendChild(caret);
            toggle.appendChild(gt);
            toggle.appendChild(gc);
            toggle.addEventListener("click", () => {
              if (collapsedBpGroups.has(groupKey)) collapsedBpGroups.delete(groupKey);
              else collapsedBpGroups.add(groupKey);
              renderCards();
            });
            gh.appendChild(toggle);
            const gcards = document.createElement("div");
            gcards.className = "bp-group-cards";
            group.rows.forEach((item) => gcards.appendChild(buildBpProcessCard(item, cardCtx)));
            section.appendChild(gh);
            section.appendChild(gcards);
            cardsWrap.appendChild(section);
          } else {
            group.rows.forEach((item) => cardsWrap.appendChild(buildBpProcessCard(item, cardCtx)));
          }
        });
      }

      function renderCards() {
        cardsWrap.innerHTML = "";
        boardCardsWrap.innerHTML = "";
        cardsWrap.className = "bp-cards";
        boardCardsWrap.className = "bp-cards";
        syncHubDrilldownView();

        if (!isFlowListMode) {
          const allRows = getMergedRows();
          const summaries = aggregateBpBoardSummaries(allRows).filter(
            (item) => item.boardId !== "_uncategorized"
          );

          if (!summaries.length) {
            const empty = document.createElement("div");
            empty.className = "bp-hub-empty";
            const emptyTitle = document.createElement("p");
            emptyTitle.className = "bp-hub-empty-title";
            emptyTitle.textContent = "暂无场景";
            const emptyDesc = document.createElement("p");
            emptyDesc.className = "bp-hub-empty-desc";
            emptyDesc.textContent =
              "进入场景定义创建业务场景，或在流程开发完成后保存到列表";
            empty.appendChild(emptyTitle);
            empty.appendChild(emptyDesc);
            boardCardsWrap.appendChild(empty);
            return;
          }

          renderScenePanoramaDashboard(boardCardsWrap, summaries, allRows);
          return;
        }

        const rows = getMergedRows().filter(matchesFilters);
        syncFlowPanelHeader(rows.length);

        if (!rows.length) {
          const empty = document.createElement("div");
          empty.className = "bp-hub-empty";
          const emptyTitle = document.createElement("p");
          emptyTitle.className = "bp-hub-empty-title";
          emptyTitle.textContent = "暂无匹配的流程";
          const emptyDesc = document.createElement("p");
          emptyDesc.className = "bp-hub-empty-desc";
          emptyDesc.textContent = "尝试调整筛选条件，或新建流程";
          const emptyActions = document.createElement("div");
          emptyActions.className = "bp-hub-empty-actions";
          const emptyNewBtn = document.createElement("button");
          emptyNewBtn.type = "button";
          emptyNewBtn.className = "bp-btn-primary";
          emptyNewBtn.textContent = "新建流程";
          emptyNewBtn.addEventListener("click", () => openBpNewFlowModal());
          emptyActions.appendChild(emptyNewBtn);
          empty.appendChild(emptyTitle);
          empty.appendChild(emptyDesc);
          empty.appendChild(emptyActions);
          cardsWrap.appendChild(empty);
          updateBulkBar();
          updateSourceTemplateBanner();
          return;
        }

        renderProcessList(rows);
        updateBulkBar();
        updateSourceTemplateBanner();
      }

      search.addEventListener("input", () => renderCards());

      bulkDdBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        bulkDdMenu.hidden = !bulkDdMenu.hidden;
      });

      layout.appendChild(overviewSection);
      layout.appendChild(flowPanel);
      root.appendChild(header);
      root.appendChild(layout);

      root.addEventListener("click", () => {
        bulkDdMenu.hidden = true;
      });

      canvasEl.appendChild(root);
      if (isFlowListMode) {
        if (bpFlowListInitialBoardId) {
          filterBoardIds = [bpFlowListInitialBoardId];
          bpFlowListInitialBoardId = null;
        } else {
          filterBoardIds = [];
        }
        filterDomains = [];
      }
      syncHubDrilldownView();
      try {
        renderAllFilters();
        renderCards();
        if (!isFlowListMode) {
          requestAnimationFrame(() => openSpPlaceholderModal());
        }
      } catch (renderErr) {
        console.error("scene panorama render failed", renderErr);
        boardCardsWrap.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "bp-hub-empty";
        const emptyTitle = document.createElement("p");
        emptyTitle.className = "bp-hub-empty-title";
        emptyTitle.textContent = "场景卡片渲染失败";
        const emptyDesc = document.createElement("p");
        emptyDesc.className = "bp-hub-empty-desc";
        emptyDesc.textContent = String(renderErr && renderErr.message ? renderErr.message : renderErr);
        empty.appendChild(emptyTitle);
        empty.appendChild(emptyDesc);
        boardCardsWrap.appendChild(empty);
      }
      } catch (err) {
        showBpHubMountError(err);
      }
    }

      );

    function buildOverviewModulesFromVisitStack() {
      if (!opFlowVisitStack.length) return [];
      return opFlowVisitStack.map((visit) => {
        const isLive = isOpFlowVisitLive(visit);
        const flow = resolveVisitModuleFlowState(visit, isLive);
        const resources = [];
        (flow.nodes || []).forEach((name, ni) => {
          if ((flow.nodeKinds || [])[ni] !== "resource") return;
          resources.push({
            id: "live_" + visit.leafId + "_" + ni,
            kind: getNavResourceKind(visit.leafId) || "models",
            name,
            fromNode: visit.operationLabel || getDefaultOperationLabelForLeaf(visit.leafId),
            leafId: visit.leafId,
            status: "online",
          });
        });
        if (!resources.length && opFlowSourceProcessItem) {
          const saved = getBpFlowModules(opFlowSourceProcessItem).find(
            (m) => m.leafId === visit.leafId
          );
          if (saved && saved.resources) return { ...saved };
        }
        return {
          leafId: visit.leafId,
          label: visit.operationLabel || getModuleOperationLabel({ leafId: visit.leafId }),
          resources,
        };
      });
    }

    function getBpOverviewModules() {
      if (opFlowSourceProcessItem) {
        const saved = getBpFlowModules(opFlowSourceProcessItem);
        if (saved.length) return saved;
      }
      if (devPathFlowState && devPathFlowState.modules && devPathFlowState.modules.length) {
        return devPathFlowState.modules;
      }
      return buildOverviewModulesFromVisitStack();
    }

    function getBpOverviewModuleTitle(module, index, modules) {
      if (!module) return "未命名模块";
      const leafLabel = getNavLeafLabel(module.leafId) || module.leafId || "模块";
      const dupCount = (modules || []).filter((m) => m.leafId === module.leafId).length;
      if (dupCount > 1 && module.label && module.label !== leafLabel) {
        return leafLabel + " · " + module.label;
      }
      return getOpFlowSectionTitle(module.leafId) || leafLabel;
    }

    function summarizeModuleResourceStats(module) {
      const resources = (module && module.resources) || [];
      let success = 0;
      let failed = 0;
      resources.forEach((r) => {
        const kind = r.kind || getNavResourceKind(module.leafId);
        const tone =
          (BP_RES_STATUS[kind] &&
            BP_RES_STATUS[kind][r.status] &&
            BP_RES_STATUS[kind][r.status].tone) ||
          "default";
        if (tone === "success") success += 1;
        else if (tone === "error") failed += 1;
      });
      return { total: resources.length, success, failed };
    }

    function formatBpOverviewModifyTime(resource, item, index) {
      const base = (item && item.updateTime) || (item && item.createTime) || "2026-06-10";
      const h = ((bpItemHash(item) + index * 17) % 24).toString().padStart(2, "0");
      const m = ((bpItemHash(item) + index * 13) % 60).toString().padStart(2, "0");
      const s = ((bpItemHash(item) + index * 7) % 60).toString().padStart(2, "0");
      if (String(base).includes(":")) return base;
      return base + " " + h + ":" + m + ":" + s;
    }

    function mapResourceToOverviewRow(resource, module, item, index) {
      const kind = resource.kind || getNavResourceKind(module.leafId) || "models";
      const kindMeta = getResourceKindMeta(kind);
      const typeLabel = resource.type || (kindMeta ? kindMeta.label : kind);
      const code = String(resource.id || resource.name || "res")
        .replace(/^res_/, "")
        .slice(0, 32);
      return {
        name: resource.name || "—",
        code,
        type: typeLabel,
        modifyTime: formatBpOverviewModifyTime(resource, item, index),
        status: resource.status,
        kind,
        errorMsg: resource.errorMsg || "",
      };
    }

    function openBpResourceOverviewAtModule(stackIndex, leafId) {
      if (!isProcessDevWorkspace()) return;
      const modules = getBpOverviewModules();
      if (!modules.length) {
        showToast("当前流程暂无可查看的资源", "info");
        return;
      }
      bpWorkspaceResourceOverview = true;
      bpOverviewSearchQuery = "";
      bpOverviewPage = 1;
      if (typeof stackIndex === "number" && stackIndex >= 0 && stackIndex < modules.length) {
        bpOverviewModuleIndex = stackIndex;
      } else if (leafId) {
        const idx = modules.findIndex((m) => m.leafId === leafId);
        bpOverviewModuleIndex = idx >= 0 ? idx : 0;
      } else {
        bpOverviewModuleIndex = 0;
      }
      selectedLeafId = null;
      centerOverride = null;
      activeOpFlowSectionTitle = null;
      syncMainLayout();
      collapseNavPanel();
      renderNav({ skipSyncCanvas: true });
      syncCanvas();
      renderOperationFlow();
    }

    function renderBpOverviewStatusBadge(kind, statusKey) {
      const def = (BP_RES_STATUS[kind] && BP_RES_STATUS[kind][statusKey]) || {
        label: statusKey || "—",
        tone: "default",
      };
      let label = def.label;
      if (def.tone === "success") label = "成功";
      else if (def.tone === "error") label = "失败";
      else if (def.tone === "processing") label = "进行中";
      const span = document.createElement("span");
      span.className = "bp-res-status bp-res-status--" + def.tone;
      span.textContent = label;
      return span;
    }

      const pager = document.createElement("div");
      pager.className = "bp-ws-overview-pager";

      totalText.textContent = "共 " + total + " 条";

        const opt = document.createElement("option");

      const btnWrap = document.createElement("div");
      btnWrap.className = "bp-ws-overview-pager-btns";
      const prevBtn = document.createElement("button");
      prevBtn.type = "button";
      prevBtn.textContent = "‹";

      const pageBtn = document.createElement("button");
      pageBtn.type = "button";

      pageBtn.textContent = String(bpOverviewPage);
      const nextBtn = document.createElement("button");
      nextBtn.type = "button";

      btnWrap.appendChild(pageBtn);
      btnWrap.appendChild(nextBtn);
      pager.appendChild(totalText);
      pager.appendChild(pageSizeSelect);
      pager.appendChild(btnWrap);

      panel.appendChild(hd);
      panel.appendChild(tableWrap);
      panel.appendChild(pager);
      root.appendChild(cards);
      root.appendChild(panel);
      canvasEl.appendChild(root);
    }

    function escapeHtmlBm(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

    function bmKbFileIcon(ext) {

    function bmKbCollectTreeFlat(nodes, depth, out) {
      nodes.forEach((node) => {
        out.push({ node, depth });
        if (node.children && node.children.length && bmKbTreeExpanded[node.id]) {
          bmKbCollectTreeFlat(node.children, depth + 1, out);
        }
      });
    }

    function bmKbRowMatchesTree(row, treeId) {
      if (!treeId || treeId === BM_KB_TREE_ALL) return true;
      if (row.categoryId === treeId) return true;
      const findNode = (nodes, id) => {
        for (const n of nodes) {
          if (n.id === id) return n;
          if (n.children) {
            const hit = findNode(n.children, id);
            if (hit) return hit;
          }
        }
        return null;
      };
      const collectDesc = (node, acc) => {
        acc.push(node.id);
        (node.children || []).forEach((c) => collectDesc(c, acc));
      };
      const rootChildren = bmKbTreeNodes[0].children || [];
      const sel = findNode(rootChildren, treeId);
      if (!sel) return row.categoryId === treeId;
      const ids = [];
      collectDesc(sel, ids);
      return ids.includes(row.categoryId);
    }

    function buildReverseStepper(currentStep) {
      const steps = document.createElement("div");
      steps.className = "rm-steps";
      const defs = [
        { n: 1, t: "映射选择" },
        { n: 2, t: "信息填写" },
        { n: 3, t: "表提取" },
      ];
      defs.forEach((d, i) => {
        if (i > 0) {
          const line = document.createElement("div");
          line.className =
            "rm-step-connector" + (currentStep > i ? " rm-step-connector--done" : "");
          line.setAttribute("aria-hidden", "true");
          steps.appendChild(line);
        }
        const step = document.createElement("div");
        const done = currentStep > d.n;
        const active = currentStep === d.n;
        step.className =
          "rm-step" +
          (active ? " rm-step--active" : "") +
          (done ? " rm-step--done" : "");
        const circle = document.createElement("div");
        circle.className = "rm-step-circle";
        circle.textContent = done ? "✓" : String(d.n);
        const title = document.createElement("div");
        title.className = "rm-step-title";
        title.textContent = d.t;
        step.appendChild(circle);
        step.appendChild(title);
        steps.appendChild(step);
      });
      return steps;
    }

    function navigateToNavLeaf(leafId, options) {
      const opts = options || {};

        showToast("请先新建流程，或从流程列表进入流程", "info");
        return;
      }
      const prev = selectedLeafId;
      if (prev === "smart-dev") smartDevScriptEditorActive = false;
      if (!opts.skipOpStack && prev && prev !== leafId) prepareOpStackForNavChange(prev);
      resourceDetailState = null;
      centerOverride = null;
      const flowViewMode = isOpFlowFlowViewMode();
      if (!opts.keepBpMode && !flowViewMode) {
        resetOpFlowBusinessProcessContext();
      } else if (opFlowFromBusinessProcess) {
        bpWorkspaceResourceOverview = false;
      }
      if (!flowViewMode && !opts.skipStateReset) {
        resetStateForNavLeaf(leafId);
      }
      switchOpFlowModule(leafId, {
        skipAppendOp: !!opts.skipAppendOp,
        skipSyncCanvas: false,
      });
    }

      const g = navTree.find((n) => n.type === "group" && n.id === groupId);
      if (!g) return;
      g.expanded = !g.expanded;
      renderNav();
